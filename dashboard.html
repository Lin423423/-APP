<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儀表板 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="pc_auth.js"></script>
<style>
body{display:flex;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.stat-label{font-size:0.74rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px;}
.stat-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.stat-sub{font-size:0.74rem;color:var(--text3);margin-top:5px;}
.stat-sub.green{color:var(--green);}
.stat-sub.orange{color:var(--orange);}

.section-title{font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:14px;}

.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
.event-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all 0.15s;box-shadow:var(--shadow);position:relative;}
.event-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(79,110,247,0.1);transform:translateY(-2px);}
.ec-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px;}
.ec-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:700;color:var(--text);line-height:1.3;flex:1;}
.ec-meta{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.ec-meta span{font-size:0.78rem;color:var(--text2);display:flex;align-items:center;gap:4px;}
.ec-revenue{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.rev-box{background:var(--surface);border-radius:8px;padding:8px 12px;}
.rev-label{font-size:0.68rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px;}
.rev-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:700;}
.rev-val.collected{color:var(--green);}
.rev-val.expected{color:var(--text);}
.ec-progress-wrap{margin-top:2px;}
.ec-progress-text{display:flex;justify-content:space-between;font-size:0.74rem;color:var(--text2);margin-top:4px;}
.ec-arrow{position:absolute;bottom:18px;right:18px;color:var(--text3);font-size:0.85rem;transition:all 0.15s;}
.event-card:hover .ec-arrow{color:var(--accent);transform:translateX(3px);}

.empty-state{text-align:center;padding:60px 20px;color:var(--text2);}
.empty-icon{font-size:3rem;margin-bottom:14px;opacity:0.4;}
.empty-state p{margin-bottom:20px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item active" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <a class="nav-item" href="pay.html"><span class="icon">💳</span>繳費頁範例</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">幹</div>
      <div class="user-info"><div class="user-name" id="userName">載入中</div><div class="user-role">社團幹部</div></div>
      <button class="logout-btn" onclick="PC_logout()" title="登出">↩</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div><div class="page-title">總覽儀表板</div><div class="page-sub" id="greetMsg"></div></div>
  </div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">總收款金額</div><div class="stat-val" id="sTotal" style="color:var(--green)">$0</div><div class="stat-sub green">所有活動合計</div></div>
    <div class="stat-card"><div class="stat-label">應收金額</div><div class="stat-val" id="sExpected">$0</div><div class="stat-sub">全部活動總應收</div></div>
    <div class="stat-card"><div class="stat-label">整體繳費率</div><div class="stat-val" id="sRate">0%</div><div class="stat-sub" id="sRateSub"></div></div>
    <div class="stat-card"><div class="stat-label">進行中活動</div><div class="stat-val" id="sActive">0</div><div class="stat-sub">個活動</div></div>
  </div>

  <div class="section-title">所有活動</div>
  <div class="events-grid" id="eventsGrid"></div>
</main>
<div class="toast" id="toast"></div>
<script>
const user=PC_requireLogin(); if(!user)throw new Error('redirect');
PC_fillSidebarUser();
const h=new Date().getHours();
document.getElementById('greetMsg').textContent=(h<12?'早安':h<18?'午安':'晚安')+'，'+user.name+'！';

function renderSidebar(){
  const evts=PC_getEvents();
  document.getElementById('sidebarEvents').innerHTML=evts.map(e=>{
    const payers=PC_getPayers(e),paid=payers.filter(m=>m.status==='paid').length,pct=payers.length?Math.round(paid/payers.length*100):0;
    return `<a class="nav-event" href="event.html?id=${e.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span><span style="font-size:0.72rem;color:var(--text3);flex-shrink:0;margin-left:6px">${pct}%</span></a>`;
  }).join('');
}

function renderStats(){
  const evts=PC_getEvents();
  let collected=0,expected=0,paidCount=0,payerTotal=0,active=0;
  evts.forEach(e=>{
    if(e.status==='active')active++;
    collected+=PC_getCollected(e); expected+=PC_getExpected(e);
    const payers=PC_getPayers(e); payerTotal+=payers.length; paidCount+=payers.filter(m=>m.status==='paid').length;
  });
  document.getElementById('sTotal').textContent='$'+collected.toLocaleString();
  document.getElementById('sExpected').textContent='$'+expected.toLocaleString();
  const rate=payerTotal?Math.round(paidCount/payerTotal*100):0;
  document.getElementById('sRate').textContent=rate+'%';
  document.getElementById('sRateSub').textContent=paidCount+' / '+payerTotal+' 人';
  document.getElementById('sActive').textContent=active;
}

function renderEvents(){
  const evts=PC_getEvents();
  const grid=document.getElementById('eventsGrid');
  if(!evts.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>還沒有任何活動，點左側「建立活動」開始</p></div>`;
    return;
  }
  grid.innerHTML=evts.map(e=>{
    const payers=PC_getPayers(e);
    const paid=payers.filter(m=>m.status==='paid').length;
    const pct=payers.length?Math.round(paid/payers.length*100):0;
    const collected=PC_getCollected(e),expected=PC_getExpected(e);
    const tagCls=e.status==='active'?'badge-green':e.status==='overdue'?'badge-red':'badge-gray';
    const tagTxt=e.status==='active'?'進行中':e.status==='overdue'?'已逾期':'已結束';
    const pctColor=pct===100?'green':'';
    return `<div class="event-card" onclick="location.href='event.html?id=${e.id}'">
      <div class="ec-top">
        <div class="ec-title">${e.title}</div>
        <span class="badge ${tagCls}">${tagTxt}</span>
      </div>
      <div class="ec-meta">
        <span>👥 ${payers.length} 位繳費成員</span>
        <span>📅 ${e.deadline}</span>
      </div>
      <div class="ec-revenue">
        <div class="rev-box"><div class="rev-label">實收金額</div><div class="rev-val collected">$${collected.toLocaleString()}</div></div>
        <div class="rev-box"><div class="rev-label">應收金額</div><div class="rev-val expected">$${expected.toLocaleString()}</div></div>
      </div>
      <div class="ec-progress-wrap">
        <div class="progress-bar"><div class="progress-fill ${pctColor}" style="width:${pct}%"></div></div>
        <div class="ec-progress-text"><span>${paid}/${payers.length} 人已繳</span><span style="font-weight:700;color:${pct===100?'var(--green)':'var(--text2)'}">${pct}%</span></div>
      </div>
      <div class="ec-arrow">→</div>
    </div>`;
  }).join('');
}

renderStats(); renderEvents(); renderSidebar();
</script>
</body></html>
