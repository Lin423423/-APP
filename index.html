<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayClub — 校園金流管理平台</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--accent:#4f6ef7;--text:#f0f0ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:var(--text);font-family:'Noto Sans TC','Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.container{text-align:center;max-width:600px;padding:40px 20px;}
.logo{font-size:4rem;margin-bottom:20px;}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:3rem;font-weight:800;margin-bottom:16px;}
p{font-size:1.2rem;color:rgba(255,255,255,0.8);margin-bottom:40px;}
.btn{display:inline-block;padding:16px 48px;background:#fff;color:#667eea;border-radius:12px;font-size:1.1rem;font-weight:700;text-decoration:none;transition:all 0.3s;box-shadow:0 8px 24px rgba(0,0,0,0.2);}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,0.3);}
.redirect-text{margin-top:24px;font-size:0.9rem;color:rgba(255,255,255,0.6);}
</style>
<script>
// 檢查是否已登入
const user = sessionStorage.getItem('pc_current_user');
if(user){
  // 已登入，跳轉到儀表板
  location.href = 'dashboard.html';
} else {
  // 未登入，3秒後跳轉到登入頁
  setTimeout(() => {
    location.href = 'login.html';
  }, 3000);
}
</script>
</head>
<body>
<div class="container">
  <div class="logo">💰</div>
  <h1>PayClub</h1>
  <p>校園社團金流管理平台</p>
  <a href="login.html" class="btn">立即開始</a>
  <div class="redirect-text">正在跳轉到登入頁面...</div>
</div>
</body>
</html>
