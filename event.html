<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動詳情 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:0.8rem;color:var(--text3);margin-bottom:14px;}
.breadcrumb a{color:var(--text2);text-decoration:none;}.breadcrumb a:hover{color:var(--accent);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.sbox{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);}
.sbox-label{font-size:0.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;}
.sbox-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.sbox-sub{font-size:0.7rem;color:var(--text3);margin-top:3px;}
.two-col{display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;}
.section-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.sc-header{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sc-title{font-size:0.86rem;font-weight:700;}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;}
.ftab{padding:4px 10px;border-radius:100px;font-size:0.74rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;}
.ftab.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.member-row{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);gap:10px;transition:background 0.1s;flex-wrap:wrap;}
.member-row:last-child{border-bottom:none;}
.member-row:hover{background:var(--surface);}
.m-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.74rem;font-weight:700;color:#fff;flex-shrink:0;}
.m-info{flex:1;min-width:0;}
.m-name{font-size:0.85rem;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.m-time{font-size:0.7rem;color:var(--text3);margin-top:1px;}
.m-amount{font-size:0.85rem;font-weight:700;color:var(--text2);flex-shrink:0;}
.mark-btn{background:var(--green-light);border:1px solid #bbf7d0;color:var(--green);padding:4px 8px;border-radius:6px;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;}
.del-btn{background:var(--red-light);border:1px solid #fecaca;color:var(--red);padding:4px 7px;border-radius:6px;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;}
.share-card,.progress-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;}
.share-label{font-size:0.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.share-url{background:var(--surface);border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-size:0.76rem;color:var(--accent);word-break:break-all;margin-bottom:7px;}
.copy-btn{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.83rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.copy-btn:hover{background:var(--accent-dark);}
.prog-dots{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.prog-dot-row{display:flex;align-items:center;gap:7px;font-size:0.76rem;color:var(--text2);}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.dl-edit-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px;}
.dl-edit-row select{padding:3px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:0.76rem;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--white);}
.dl-save{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:0.73rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(2px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.overlay.show{display:flex;}
.modal{background:var(--white);border-radius:14px;padding:22px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.15);animation:slideUp 0.2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:800;margin-bottom:14px;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}.stats-row{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){.stats-row{grid-template-columns:1fr 1fr;}.sbox-val{font-size:1.2rem;}.member-row{gap:6px;}}
</style>
</head>
<body>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>
<nav class="mobile-nav">
  <div class="mobile-nav-logo"><span style="width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:4px"></span>PayClub</div>
  <button class="hamburger" onclick="openSidebar()">☰</button>
</nav>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <a class="nav-item" href="pay.html"><span class="icon">💳</span>繳費範例</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
    <a class="nav-item" href="index.html"><span class="icon">🌐</span>首頁</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">幹</div>
      <div class="user-info"><div class="user-name" id="userName">載入中</div><div class="user-role">社團幹部</div></div>
      <button class="logout-btn" onclick="PC_logout()">登出</button>
    </div>
  </div>
</aside>
<main class="main">
  <div class="breadcrumb"><a href="dashboard.html">總覽</a><span>›</span><span id="bcTitle">活動</span></div>
  <div class="topbar">
    <div>
      <div class="page-title" id="evtTitle">載入中...</div>
      <div class="page-sub" id="evtDesc"></div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:0.8rem;color:var(--text2)">截止：</span>
        <span id="deadlineDisplay" style="font-size:0.8rem;font-weight:600"></span>
        <button onclick="toggleDlEdit()" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:3px 9px;border-radius:6px;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">✏️ 修改</button>
      </div>
      <div id="dlEditRow" style="display:none;" class="dl-edit-row">
        <select id="dlYear"></select><select id="dlMonth" onchange="updateDlDays()"></select><select id="dlDay"></select>
        <button class="dl-save" onclick="saveDl()">儲存</button>
        <button onclick="toggleDlEdit()" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:4px 9px;border-radius:6px;font-size:0.72rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">取消</button>
      </div>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-ghost" onclick="sendReminder()">📣 催款</button>
      <button class="btn btn-ghost" onclick="location.href='report.html'">📄 報表</button>
      <button class="btn btn-primary" onclick="openAdd()">+ 新增成員</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="sbox"><div class="sbox-label">實收</div><div class="sbox-val" id="sC" style="color:var(--green)">$0</div><div class="sbox-sub">已繳合計</div></div>
    <div class="sbox"><div class="sbox-label">應收</div><div class="sbox-val" id="sE">$0</div><div class="sbox-sub">繳費者總應收</div></div>
    <div class="sbox"><div class="sbox-label">待收</div><div class="sbox-val" id="sP" style="color:var(--orange)">$0</div><div class="sbox-sub" id="sPsub"></div></div>
    <div class="sbox"><div class="sbox-label">截止倒數</div><div class="sbox-val" id="sDays" style="font-size:1rem;padding-top:4px">—</div><div class="sbox-sub" id="sDl"></div></div>
  </div>
  <div class="two-col">
    <div>
      <div class="section-card">
        <div class="sc-header">
          <div>
            <div class="sc-title">成員繳費狀態</div>
            <div style="display:flex;gap:5px;margin-top:4px;flex-wrap:wrap;">
              <span class="badge badge-blue" style="font-size:0.65rem">繳費者</span>
              <span class="badge badge-orange" style="font-size:0.65rem">統計者</span>
              <span class="badge badge-gray" style="font-size:0.65rem">觀察者</span>
            </div>
          </div>
          <div class="filter-row">
            <button class="ftab active" onclick="setFilter(this,'all')">全部</button>
            <button class="ftab" onclick="setFilter(this,'paid')">已繳</button>
            <button class="ftab" onclick="setFilter(this,'pending')">待繳</button>
            <button class="ftab" onclick="setFilter(this,'overdue')">逾期</button>
          </div>
        </div>
        <div id="memberList"></div>
      </div>
    </div>
    <div>
      <div class="progress-card">
        <div class="share-label">收款進度</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
          <span style="font-size:0.82rem;color:var(--text2)">繳費率</span>
          <span id="progPct" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
        <div class="prog-dots">
          <div class="prog-dot-row"><div class="dot" style="background:var(--green)"></div>已繳：<strong id="pPaid">0</strong> 人</div>
          <div class="prog-dot-row"><div class="dot" style="background:var(--orange)"></div>待繳：<strong id="pPend">0</strong> 人</div>
          <div class="prog-dot-row"><div class="dot" style="background:var(--red)"></div>逾期：<strong id="pOvd">0</strong> 人</div>
        </div>
      </div>
      <div class="share-card">
        <div class="share-label">🔗 成員繳費連結</div>
        <div class="share-url" id="shareUrl">—</div>
        <button class="copy-btn" onclick="copyLink()">複製連結</button>
        <a id="previewLink" href="#" target="_blank" class="btn btn-ghost" style="width:100%;margin-top:8px;justify-content:center;font-size:0.83rem;">預覽繳費頁面 →</a>
      </div>
    </div>
  </div>
</main>
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-title">新增成員</div>
    <div class="form-group"><label class="form-label">姓名</label><input type="text" id="addName" class="form-input" placeholder="林小明" onkeydown="if(event.key==='Enter')addMember()"></div>
    <div class="form-group"><label class="form-label">角色</label>
      <select id="addRole" class="form-input" onchange="toggleAmt()">
        <option value="payer">繳費者（需繳款）</option>
        <option value="counter">統計者（不需繳款）</option>
        <option value="observer">觀察者（不需繳款）</option>
      </select>
    </div>
    <div class="form-group" id="customAmtWrap" style="display:none"><label class="form-label">自訂金額</label><input type="number" id="addAmt" class="form-input" placeholder="0" min="0"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeAdd()">取消</button>
      <button class="btn btn-primary" style="flex:2" onclick="addMember()">新增</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const user=PC_requireLogin();if(!user)throw new Error('r');
PC_fillSidebarUser();
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');}
const params=new URLSearchParams(location.search);
const eventId=params.get('id');
if(!eventId)location.href='dashboard.html';
let evt=null,cf='all';
const RL={payer:'繳費者',counter:'統計者',observer:'觀察者'};
const RC={payer:'#4f6ef7',counter:'#d97706',observer:'#9ca3af'};
const RB={payer:'badge-blue',counter:'badge-orange',observer:'badge-gray'};
function renderSidebar(){
  const evts=PC_getEvents();
  document.getElementById('sidebarEvents').innerHTML=evts.map(e=>`<a class="nav-event${e.id===eventId?' current':''}" href="event.html?id=${e.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`).join('');
}
function renderPage(){
  evt=PC_getEvent(eventId);if(!evt){location.href='dashboard.html';return;}
  document.title=evt.title+' — PayClub';
  document.getElementById('bcTitle').textContent=evt.title;
  document.getElementById('evtTitle').textContent=evt.title;
  document.getElementById('evtDesc').textContent=evt.desc||'';
  document.getElementById('deadlineDisplay').textContent=evt.deadline;
  const p=PC_getPayers(evt),paid=p.filter(m=>m.status==='paid').length,pend=p.filter(m=>m.status==='pending').length,ovd=p.filter(m=>m.status==='overdue').length;
  const pct=p.length?Math.round(paid/p.length*100):0;
  const c=PC_getCollected(evt),e=PC_getExpected(evt);
  document.getElementById('sC').textContent='$'+c.toLocaleString();
  document.getElementById('sE').textContent='$'+e.toLocaleString();
  document.getElementById('sP').textContent='$'+(e-c).toLocaleString();
  document.getElementById('sPsub').textContent=(pend+ovd)+' 人未繳';
  const dl=new Date(evt.deadline),days=Math.ceil((dl-new Date())/(1000*60*60*24));
  const de=document.getElementById('sDays');
  de.textContent=days>0?'剩 '+days+' 天':'已截止';
  de.style.color=days<=3?'var(--red)':'inherit';
  document.getElementById('sDl').textContent=evt.deadline;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  if(pct===100)document.getElementById('progFill').classList.add('green');
  else document.getElementById('progFill').classList.remove('green');
  document.getElementById('pPaid').textContent=paid;
  document.getElementById('pPend').textContent=pend;
  document.getElementById('pOvd').textContent=ovd;
  const url=location.href.replace(/event\.html.*/,'')+'pay.html?event='+evt.id;
  document.getElementById('shareUrl').textContent=url;
  document.getElementById('previewLink').href=url;
  renderMembers();renderSidebar();
}
function renderMembers(){
  let ms=evt.members||[];
  if(cf==='paid')ms=ms.filter(m=>m.status==='paid');
  else if(cf==='pending')ms=ms.filter(m=>m.status==='pending');
  else if(cf==='overdue')ms=ms.filter(m=>m.status==='overdue');
  if(!ms.length){document.getElementById('memberList').innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:0.84rem;">沒有符合的成員</div>';return;}
  document.getElementById('memberList').innerHTML=ms.map(m=>{
    const ri=(evt.members||[]).indexOf(m);
    const amt=m.role==='payer'?'$'+PC_getExpectedAmount(evt,m):'—';
    const bc=m.role!=='payer'?'badge-gray':(m.status==='paid'?'badge-green':m.status==='overdue'?'badge-red':'badge-orange');
    const bt=m.role!=='payer'?RL[m.role]:(m.status==='paid'?'已繳費':m.status==='overdue'?'逾期':'待繳費');
    return `<div class="member-row">
      <div class="m-av" style="background:${RC[m.role]||'#9ca3af'}">${(m.name||'?').slice(0,1)}</div>
      <div class="m-info"><div class="m-name">${m.name||'—'} <span class="badge ${RB[m.role]||'badge-gray'}" style="font-size:0.63rem;padding:1px 6px">${RL[m.role]||m.role}</span></div><div class="m-time">${m.paidAt||'—'}</div></div>
      <div class="m-amount">${amt}</div>
      <span class="badge ${bc}">${bt}</span>
      ${m.role==='payer'&&m.status!=='paid'?`<button class="mark-btn" onclick="markPaid(${ri})">✓</button>`:''}
      <button class="del-btn" onclick="delMember(${ri})">✕</button>
    </div>`;
  }).join('');
}
function setFilter(el,f){cf=f;document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderMembers();}
function markPaid(i){const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);e.members[i].status='paid';e.members[i].paidAt=PC_nowStr();PC_saveEvents(evts);renderPage();PC_toast('✅ 已標記繳費');}
function delMember(i){const n=(evt.members[i]||{}).name||'此成員';if(!confirm('移除「'+n+'」？'))return;const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);e.members.splice(i,1);PC_saveEvents(evts);renderPage();PC_toast('已移除 '+n);}
function copyLink(){navigator.clipboard.writeText(document.getElementById('shareUrl').textContent).catch(()=>{});PC_toast('🔗 連結已複製');}
function sendReminder(){const n=(evt.members||[]).filter(m=>m.role==='payer'&&m.status!=='paid').length;PC_toast('📣 已發送催款給 '+n+' 位未繳成員');}
function toggleDlEdit(){const r=document.getElementById('dlEditRow');const s=r.style.display==='none';r.style.display=s?'flex':'none';if(s)initDlSel();}
function initDlSel(){const[y,m,d]=(evt.deadline||'2026-01-01').split('-').map(Number);const cy=new Date().getFullYear();const yr=document.getElementById('dlYear');yr.innerHTML='';for(let i=cy;i<=cy+5;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'年';yr.appendChild(o);}yr.value=y;const mn=document.getElementById('dlMonth');mn.innerHTML='';for(let i=1;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'月';mn.appendChild(o);}mn.value=m;updateDlDays(d);}
function updateDlDays(sv){const y=parseInt(document.getElementById('dlYear').value)||2026;const m=parseInt(document.getElementById('dlMonth').value)||1;const days=new Date(y,m,0).getDate();const dd=document.getElementById('dlDay');const pv=sv||parseInt(dd.value)||1;dd.innerHTML='';for(let i=1;i<=days;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'日';dd.appendChild(o);}dd.value=Math.min(pv,days);}
function saveDl(){const y=document.getElementById('dlYear').value,m=document.getElementById('dlMonth').value.padStart(2,'0'),d=document.getElementById('dlDay').value.padStart(2,'0');const nd=`${y}-${m}-${d}`;const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);e.deadline=nd;PC_saveEvents(evts);document.getElementById('dlEditRow').style.display='none';renderPage();PC_toast('✅ 截止日期更新為 '+nd);}
function openAdd(){document.getElementById('addName').value='';document.getElementById('addRole').value='payer';document.getElementById('addAmt').value='';toggleAmt();document.getElementById('addOverlay').classList.add('show');}
function closeAdd(){document.getElementById('addOverlay').classList.remove('show');}
document.getElementById('addOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAdd();});
function toggleAmt(){document.getElementById('customAmtWrap').style.display=(evt&&evt.amountMode==='custom'&&document.getElementById('addRole').value==='payer')?'block':'none';}
function addMember(){const name=document.getElementById('addName').value.trim(),role=document.getElementById('addRole').value;if(!name){PC_toast('請輸入姓名');return;}const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);if(!e.members)e.members=[];if(e.members.find(m=>m.name===name)){PC_toast('已有同名成員');return;}let ca=null;if(e.amountMode==='custom'&&role==='payer')ca=parseFloat(document.getElementById('addAmt').value)||0;e.members.push({name,role,status:role==='payer'?'pending':'none',paidAt:'',customAmount:ca});PC_saveEvents(evts);closeAdd();renderPage();PC_toast('✅ 已新增 '+name);}
renderPage();
</script>
</body></html>
