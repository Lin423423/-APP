<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動詳情 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="pc_auth.js"></script>
<style>
  :root { --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --accent:#5b5ef4; --accent2:#00e5c0; --accent3:#ff6b6b; --text:#f0f0ff; --muted:#8888aa; --border:rgba(255,255,255,0.07); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; display:flex; min-height:100vh; }

  .sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; bottom:0; z-index:50; }
  .sidebar-logo { padding:28px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; }
  .logo-dot { width:9px; height:9px; background:var(--accent2); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4);opacity:0.7} }
  .sidebar-nav { padding:16px 12px; flex:1; overflow-y:auto; }
  .nav-section { font-size:0.7rem; font-weight:700; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; padding:8px 14px 4px; margin-top:8px; }
  .nav-item { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:10px; color:var(--muted); font-size:0.87rem; font-weight:500; cursor:pointer; transition:all 0.2s; margin-bottom:2px; text-decoration:none; }
  .nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
  .nav-item.active { background:rgba(91,94,244,0.15); color:var(--accent); font-weight:600; }
  .nav-item .icon { font-size:1.05rem; width:20px; text-align:center; flex-shrink:0; }
  .nav-event { font-size:0.82rem; padding:8px 14px 8px 46px; border-radius:8px; color:var(--muted); display:flex; align-items:center; justify-content:space-between; text-decoration:none; transition:all 0.2s; margin-bottom:2px; }
  .nav-event:hover { background:rgba(255,255,255,0.03); color:var(--text); }
  .nav-event.current { background:rgba(91,94,244,0.1); color:var(--text); font-weight:600; }
  .sidebar-bottom { padding:16px 12px; border-top:1px solid var(--border); }
  .user-card { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; background:var(--card); border:1px solid var(--border); }
  .avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; flex-shrink:0; }
  .user-info { flex:1; min-width:0; }
  .user-name { font-size:0.85rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .user-role { font-size:0.7rem; color:var(--accent2); }
  .logout-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.95rem; padding:4px; transition:color 0.2s; }
  .logout-btn:hover { color:var(--accent3); }

  .main { margin-left:240px; flex:1; padding:36px 40px; }
  .breadcrumb { display:flex; align-items:center; gap:8px; font-size:0.82rem; color:var(--muted); margin-bottom:20px; }
  .breadcrumb a { color:var(--muted); text-decoration:none; transition:color 0.2s; }
  .breadcrumb a:hover { color:var(--text); }
  .breadcrumb span { color:var(--text); font-weight:600; }

  .event-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:28px; gap:20px; flex-wrap:wrap; }
  .event-title-wrap { flex:1; }
  .event-title { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; letter-spacing:-0.04em; margin-bottom:8px; line-height:1.1; }
  .event-desc { color:var(--muted); font-size:0.9rem; line-height:1.6; }
  .event-actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { padding:10px 18px; border-radius:10px; font-size:0.85rem; font-weight:700; cursor:pointer; border:none; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; display:inline-flex; align-items:center; gap:7px; text-decoration:none; }
  .btn-accent { background:var(--accent); color:#fff; }
  .btn-accent:hover { background:#7b7ef8; transform:translateY(-1px); box-shadow:0 6px 20px rgba(91,94,244,0.4); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:rgba(255,255,255,0.15); color:var(--text); }
  .btn-green { background:rgba(0,229,192,0.12); color:var(--accent2); border:1px solid rgba(0,229,192,0.2); }
  .btn-green:hover { background:rgba(0,229,192,0.2); }

  .stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:28px; }
  .stat-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:18px 20px; }
  .stat-box-label { font-size:0.72rem; color:var(--muted); font-weight:600; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:8px; }
  .stat-box-val { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; letter-spacing:-0.04em; line-height:1; }
  .stat-box-sub { font-size:0.72rem; color:var(--muted); margin-top:5px; }

  .progress-section { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:20px 24px; margin-bottom:24px; }
  .prog-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .prog-label { font-size:0.85rem; font-weight:600; }
  .prog-pct { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; color:var(--accent2); }
  .progress-bar { height:10px; background:rgba(255,255,255,0.05); border-radius:100px; overflow:hidden; margin-bottom:8px; }
  .progress-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width 1s cubic-bezier(0.16,1,0.3,1); }
  .prog-sub { display:flex; gap:20px; font-size:0.78rem; color:var(--muted); }
  .prog-sub span { display:flex; align-items:center; gap:6px; }
  .dot { width:7px; height:7px; border-radius:50%; }

  .share-section { background:linear-gradient(135deg,rgba(91,94,244,0.1),rgba(0,229,192,0.05)); border:1px solid rgba(91,94,244,0.2); border-radius:14px; padding:20px 24px; margin-bottom:24px; }
  .share-label { font-size:0.78rem; font-weight:700; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:10px; }
  .share-row { display:flex; gap:10px; align-items:center; }
  .share-url { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:11px 14px; font-size:0.85rem; color:var(--accent2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .copy-btn { background:var(--accent); color:#fff; padding:10px 18px; border-radius:9px; font-size:0.82rem; font-weight:700; cursor:pointer; border:none; font-family:'Noto Sans TC',sans-serif; white-space:nowrap; transition:all 0.2s; }
  .copy-btn:hover { background:#7b7ef8; }

  .member-section { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
  .member-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .member-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; }
  .filter-tabs { display:flex; gap:6px; }
  .ftab { padding:5px 14px; border-radius:100px; font-size:0.78rem; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; }
  .ftab.active { border-color:var(--accent); background:rgba(91,94,244,0.12); color:var(--accent); }
  .member-row { display:flex; align-items:center; padding:14px 24px; border-bottom:1px solid var(--border); transition:background 0.15s; gap:14px; }
  .member-row:last-child { border-bottom:none; }
  .member-row:hover { background:rgba(255,255,255,0.02); }
  .m-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.82rem; font-weight:700; flex-shrink:0; }
  .m-info { flex:1; min-width:0; }
  .m-name { font-size:0.92rem; font-weight:600; }
  .m-time { font-size:0.75rem; color:var(--muted); margin-top:2px; }
  .m-amount { font-size:0.92rem; font-weight:700; color:var(--muted); margin-right:12px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:100px; font-size:0.72rem; font-weight:700; }
  .badge-paid { background:rgba(0,229,192,0.12); color:var(--accent2); }
  .badge-pending { background:rgba(251,146,60,0.12); color:#fb923c; }
  .badge-overdue { background:rgba(255,107,107,0.12); color:var(--accent3); }
  .mark-btn { background:rgba(0,229,192,0.08); border:1px solid rgba(0,229,192,0.2); color:var(--accent2); padding:5px 12px; border-radius:7px; font-size:0.75rem; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; flex-shrink:0; }
  .mark-btn:hover { background:rgba(0,229,192,0.18); }

  /* ADD MEMBER MODAL */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:200; display:none; align-items:center; justify-content:center; padding:24px; }
  .overlay.show { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:32px; width:100%; max-width:440px; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .modal-title { font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800; margin-bottom:20px; }
  .form-group { margin-bottom:14px; }
  label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:7px; letter-spacing:0.05em; text-transform:uppercase; }
  input,textarea { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-size:0.92rem; font-family:'Noto Sans TC',sans-serif; outline:none; transition:border-color 0.2s; resize:vertical; }
  input:focus,textarea:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:12px; margin-top:18px; }

  .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(60px); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:13px 20px; font-size:0.88rem; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  @media(max-width:900px) { .sidebar{display:none} .main{margin-left:0;padding:24px 20px} .stats-row{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
    <a class="nav-item" href="index.html"><span class="icon">🌐</span>回首頁</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">幹</div>
      <div class="user-info">
        <div class="user-name" id="userName">載入中</div>
        <div class="user-role">社團幹部</div>
      </div>
      <button class="logout-btn" onclick="PC_logout()" title="登出">⏏</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="breadcrumb">
    <a href="dashboard.html">總覽</a>
    <span>›</span>
    <span id="bcTitle">活動詳情</span>
  </div>

  <div class="event-header">
    <div class="event-title-wrap">
      <div class="event-title" id="evtTitle">載入中...</div>
      <div class="event-desc" id="evtDesc"></div>
    </div>
    <div class="event-actions">
      <button class="btn btn-ghost" onclick="sendReminder()">📣 發送催款</button>
      <button class="btn btn-green" onclick="location.href='report.html'">📄 查看報表</button>
      <button class="btn btn-accent" onclick="openAddMember()">+ 新增成員</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-box"><div class="stat-box-label">已收款金額</div><div class="stat-box-val" id="sCollected" style="color:var(--accent2)">$0</div><div class="stat-box-sub">已繳人數 × 金額</div></div>
    <div class="stat-box"><div class="stat-box-label">已繳人數</div><div class="stat-box-val" id="sPaid">0</div><div class="stat-box-sub" id="sPaidSub">/ 0 位成員</div></div>
    <div class="stat-box"><div class="stat-box-label">待收款</div><div class="stat-box-val" id="sUncollected" style="color:#fb923c">$0</div><div class="stat-box-sub" id="sUncolSub">未繳 0 人</div></div>
    <div class="stat-box"><div class="stat-box-label">截止日期</div><div class="stat-box-val" id="sDeadline" style="font-size:1.1rem">—</div><div class="stat-box-sub" id="sDaysLeft"></div></div>
  </div>

  <div class="progress-section">
    <div class="prog-header">
      <div class="prog-label">收款進度</div>
      <div class="prog-pct" id="progPct">0%</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-sub">
      <span><div class="dot" style="background:var(--accent2)"></div><span id="progPaidCount">0</span> 人已繳</span>
      <span><div class="dot" style="background:#fb923c"></div><span id="progPendingCount">0</span> 人待繳</span>
      <span><div class="dot" style="background:var(--accent3)"></div><span id="progOverdueCount">0</span> 人逾期</span>
    </div>
  </div>

  <div class="share-section">
    <div class="share-label">🔗 成員繳費連結</div>
    <div class="share-row">
      <div class="share-url" id="shareUrl">—</div>
      <button class="copy-btn" onclick="copyLink()">複製連結</button>
      <a id="previewLink" href="#" target="_blank" class="btn btn-ghost" style="flex-shrink:0">預覽 →</a>
    </div>
  </div>

  <div class="member-section">
    <div class="member-header">
      <div class="member-title">成員繳費狀態</div>
      <div class="filter-tabs">
        <button class="ftab active" onclick="setFilter(this,'all')">全部</button>
        <button class="ftab" onclick="setFilter(this,'paid')">已繳</button>
        <button class="ftab" onclick="setFilter(this,'pending')">待繳</button>
        <button class="ftab" onclick="setFilter(this,'overdue')">逾期</button>
      </div>
    </div>
    <div id="memberList"></div>
  </div>
</main>

<!-- ADD MEMBER MODAL -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-title">新增成員</div>
    <div class="form-group"><label>成員姓名（每行一位）</label><textarea id="addNames" rows="5" placeholder="林小明&#10;陳美玲&#10;王大衛"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeAdd()">取消</button>
      <button class="btn btn-accent" style="flex:2" onclick="addMembers()">新增成員 →</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const user = PC_requireLogin();
if (!user) throw new Error('redirect');
PC_fillSidebarUser();

const params = new URLSearchParams(location.search);
const eventId = params.get('id');
if (!eventId) location.href = 'dashboard.html';

let currentFilter = 'all';
let evt = null;

function loadEvent() {
  evt = PC_getEvent(eventId);
  if (!evt) { location.href='dashboard.html'; return; }
}

function renderSidebar() {
  const evts = PC_getEvents();
  document.getElementById('sidebarEvents').innerHTML = evts.map(e => {
    const paid = e.members.filter(m=>m.status==='paid').length;
    const pct  = e.members.length ? Math.round(paid/e.members.length*100) : 0;
    const isCurrent = e.id === eventId;
    return `<a class="nav-event${isCurrent?' current':''}" href="event.html?id=${e.id}">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span>
      <span style="font-size:0.72rem;color:${isCurrent?'var(--accent2)':'var(--muted)'};flex-shrink:0;margin-left:8px">${pct}%</span>
    </a>`;
  }).join('');
}

function renderPage() {
  loadEvent();
  document.title = evt.title + ' — PayClub';
  document.getElementById('bcTitle').textContent   = evt.title;
  document.getElementById('evtTitle').textContent  = evt.title;
  document.getElementById('evtDesc').textContent   = evt.desc || '';

  const paid    = evt.members.filter(m=>m.status==='paid').length;
  const pending = evt.members.filter(m=>m.status==='pending').length;
  const overdue = evt.members.filter(m=>m.status==='overdue').length;
  const total   = evt.members.length;
  const pct     = total ? Math.round(paid/total*100) : 0;
  const collected   = paid * evt.amount;
  const uncollected = (total - paid) * evt.amount;

  document.getElementById('sCollected').textContent    = '$' + collected.toLocaleString();
  document.getElementById('sPaid').textContent         = paid;
  document.getElementById('sPaidSub').textContent      = '/ ' + total + ' 位成員';
  document.getElementById('sUncollected').textContent  = '$' + uncollected.toLocaleString();
  document.getElementById('sUncolSub').textContent     = '未繳 ' + (pending+overdue) + ' 人';
  document.getElementById('sDeadline').textContent     = evt.deadline;

  const dl = new Date(evt.deadline);
  const daysLeft = Math.ceil((dl - new Date()) / (1000*60*60*24));
  const dlEl = document.getElementById('sDaysLeft');
  dlEl.textContent = daysLeft > 0 ? '剩 '+daysLeft+' 天' : '已截止';
  dlEl.style.color = daysLeft <= 3 ? 'var(--accent3)' : 'var(--muted)';

  document.getElementById('progPct').textContent         = pct + '%';
  document.getElementById('progFill').style.width        = pct + '%';
  document.getElementById('progPaidCount').textContent   = paid;
  document.getElementById('progPendingCount').textContent= pending;
  document.getElementById('progOverdueCount').textContent= overdue;

  const payUrl = location.href.replace(/event\.html.*/, '') + 'pay.html?event=' + evt.id;
  document.getElementById('shareUrl').textContent = payUrl;
  document.getElementById('previewLink').href = payUrl;

  renderMembers();
  renderSidebar();
}

function renderMembers() {
  const filtered = currentFilter==='all' ? evt.members : evt.members.filter(m=>m.status===currentFilter);
  if (!filtered.length) {
    document.getElementById('memberList').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">沒有符合條件的成員</div>`;
    return;
  }
  document.getElementById('memberList').innerHTML = filtered.map((m, i) => {
    const realIdx = evt.members.indexOf(m);
    const badgeCls = m.status==='paid'?'badge-paid':m.status==='overdue'?'badge-overdue':'badge-pending';
    const badgeTxt = m.status==='paid'?'已繳費':m.status==='overdue'?'逾期未繳':'待繳費';
    const hue = (realIdx * 47 + 200) % 360;
    return `<div class="member-row">
      <div class="m-avatar" style="background:hsl(${hue},40%,30%)">${m.name.slice(0,1)}</div>
      <div class="m-info">
        <div class="m-name">${m.name}</div>
        <div class="m-time">${m.paidAt || '尚未繳費'}</div>
      </div>
      <div class="m-amount">$${evt.amount}</div>
      <span class="badge ${badgeCls}">${badgeTxt}</span>
      ${m.status!=='paid'?`<button class="mark-btn" onclick="markPaid(${realIdx})">✓ 標記已繳</button>`:''}
    </div>`;
  }).join('');
}

function setFilter(el, f) {
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderMembers();
}

function markPaid(idx) {
  const evts = PC_getEvents();
  const e = evts.find(x=>x.id===eventId);
  e.members[idx].status = 'paid';
  e.members[idx].paidAt = PC_nowStr();
  PC_saveEvents(evts);
  renderPage();
  PC_toast('✅ 已標記「' + e.members[idx].name + '」繳費成功');
}

function copyLink() {
  const url = document.getElementById('shareUrl').textContent;
  navigator.clipboard.writeText(url).catch(()=>{});
  PC_toast('🔗 連結已複製！');
}

function sendReminder() {
  const unpaid = evt.members.filter(m=>m.status!=='paid').length;
  PC_toast('📣 已發送催款提醒給 ' + unpaid + ' 位未繳成員');
}

function openAddMember() { document.getElementById('addOverlay').classList.add('show'); }
function closeAdd()      { document.getElementById('addOverlay').classList.remove('show'); }
document.getElementById('addOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeAdd(); });

function addMembers() {
  const raw = document.getElementById('addNames').value.trim();
  if (!raw) { PC_toast('❌ 請輸入成員姓名'); return; }
  const names = raw.split('\n').map(n=>n.trim()).filter(Boolean);
  const evts = PC_getEvents();
  const e = evts.find(x=>x.id===eventId);
  names.forEach(name => {
    if (!e.members.find(m=>m.name===name)) {
      e.members.push({name, status:'pending', paidAt:''});
    }
  });
  PC_saveEvents(evts);
  closeAdd();
  document.getElementById('addNames').value = '';
  renderPage();
  PC_toast('✅ 已新增 ' + names.length + ' 位成員');
}

renderPage();
</script>
</body>
</html>
