<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動詳情 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.member-row{display:flex;align-items:center;padding:14px 18px;background:var(--white);border-bottom:1px solid var(--border);transition:all 0.2s;}
.member-row:hover{background:var(--surface);}
.m-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.9rem;margin-right:12px;flex-shrink:0;}
.m-info{flex:1;min-width:0;}.m-name{font-weight:700;font-size:0.92rem;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-email{font-size:0.75rem;color:var(--text3);}
.m-amount{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.95rem;color:var(--text);margin:0 12px;}
/* 操作按鈕樣式 */
.mark-btn, .del-btn{width:28px;height:28px;border-radius:6px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;font-size:0.8rem;}
.mark-btn{background:var(--accent-light);color:var(--accent);}.mark-btn:hover{background:var(--accent);color:#fff;}
.del-btn{background:var(--red-light);color:var(--red);}.del-btn:hover{background:var(--red);color:#fff;}
</style>
</head>
<body>

<script>renderSidebar();</script>

<main class="main">
  <div class="content" style="max-width:900px; width:100%;">
    <div id="eventHeader" class="card" style="padding:24px; margin-bottom:20px;">
        <h1 id="eventTitle" class="page-title">載入中...</h1>
        <p id="eventDesc" style="color:var(--text2); font-size:0.9rem; margin-top:8px;"></p>
    </div>

    <div class="card" style="padding:0; overflow:hidden;">
      <div style="padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--white);">
        <h3 style="font-size:1rem;">成員列表</h3>
        <button class="btn btn-primary" id="addBtn" onclick="openAdd()" style="padding:6px 12px; font-size:0.8rem;">+ 新增成員</button>
      </div>
      <div id="memberList"></div>
    </div>
  </div>
</main>

<div class="overlay" id="statusModalOverlay">
  <div class="modal" style="max-width:320px;">
    <div class="modal-title">⚙️ 調整繳費狀態</div>
    <div class="form-group">
      <label class="form-label">選擇新狀態</label>
      <select id="newStatusSelect" class="form-input">
        <option value="pending">待繳費</option>
        <option value="paid">已繳費</option>
        <option value="overdue">逾期</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeStatusModal()">取消</button>
      <button class="btn btn-primary" onclick="saveStatusChange()">儲存變更</button>
    </div>
  </div>
</div>

<div class="overlay" id="deleteConfirmOverlay">
  <div class="modal" style="max-width:320px; text-align:center;">
    <div style="font-size:2rem; margin-bottom:10px;">⚠️</div>
    <div class="modal-title">確定要刪除嗎？</div>
    <p style="font-size:0.85rem; color:var(--text2); margin-bottom:20px;">此操作將移除該成員所有紀錄。</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" style="flex:1" onclick="executeDelete()">確認刪除</button>
    </div>
  </div>
</div>

<script>
const eventId = new URLSearchParams(location.search).get('id');
let evt = null;
let targetIdx = -1;

function renderPage(){
  evt = PC_getEvents().find(e => e.id === eventId);
  const u = PC_getUser();
  if(!evt) { location.href='dashboard.html'; return; }

  // 權限判斷：防呆支援舊活動
  const isOwner = !evt.ownerEmail || evt.ownerEmail === u.email;
  
  document.getElementById('eventTitle').textContent = evt.title;
  document.getElementById('eventDesc').textContent = evt.desc || '暫無說明';
  document.getElementById('addBtn').style.display = isOwner ? 'block' : 'none';

  renderMembers(isOwner);
}

function renderMembers(isOwner){
  const ms = evt.members || [];
  const list = document.getElementById('memberList');
  
  if(!ms.length){
    list.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text3);">尚無成員</div>';
    return;
  }

  list.innerHTML = ms.map((m, ri) => {
    const stClass = m.status==='paid'?'badge-green':m.status==='overdue'?'badge-red':'badge-orange';
    const stText = m.status==='paid'?'已繳費':m.status==='overdue'?'逾期':'待繳費';
    
    return `
      <div class="member-row">
        <div class="m-av" style="background:#94a3b8">${(m.name||m.email||'?')[0].toUpperCase()}</div>
        <div class="m-info">
          <div class="m-name">${m.name || m.email}</div>
          <div class="m-email">${m.email}</div>
        </div>
        <div class="m-amount">$${m.customAmount || evt.amount}</div>
        <span class="badge ${stClass}">${stText}</span>
        
        ${isOwner ? `
          <div style="display:flex; gap:6px; margin-left:12px;">
            <button class="mark-btn" onclick="openStatusModal(${ri})">⚙️</button>
            <button class="del-btn" onclick="confirmDeleteMember(${ri})">✕</button>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

// 彈窗邏輯
function openStatusModal(idx){
  targetIdx = idx;
  document.getElementById('newStatusSelect').value = evt.members[idx].status;
  document.getElementById('statusModalOverlay').classList.add('show');
}
function closeStatusModal(){ document.getElementById('statusModalOverlay').classList.remove('show'); }
function saveStatusChange(){
  const newSt = document.getElementById('newStatusSelect').value;
  evt.members[targetIdx].status = newSt;
  evt.members[targetIdx].paidAt = (newSt === 'paid') ? PC_nowStr() : '';
  saveAndRefresh();
  closeStatusModal();
}

function confirmDeleteMember(idx){
  targetIdx = idx;
  document.getElementById('deleteConfirmOverlay').classList.add('show');
}
function closeDeleteModal(){ document.getElementById('deleteConfirmOverlay').classList.remove('show'); }
function executeDelete(){
  evt.members.splice(targetIdx, 1);
  saveAndRefresh();
  closeDeleteModal();
}

function saveAndRefresh(){
  const all = PC_getEvents();
  PC_saveEvents(all.map(e => e.id === eventId ? evt : e));
  renderPage();
  PC_toast('更新成功');
}

renderPage();
</script>
</body>
</html>
