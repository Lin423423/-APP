<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動詳情 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="pc_auth.js"></script>
<style>
body{display:flex;}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text3);margin-bottom:18px;}
.breadcrumb a{color:var(--text2);text-decoration:none;}.breadcrumb a:hover{color:var(--accent);}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.sbox{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.sbox-label{font-size:0.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.sbox-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;line-height:1;}
.sbox-sub{font-size:0.72rem;color:var(--text3);margin-top:4px;}
.two-col{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;}
.section-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.sc-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sc-title{font-size:0.88rem;font-weight:700;}
.filter-row{display:flex;gap:5px;}
.ftab{padding:4px 11px;border-radius:100px;font-size:0.75rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;}
.ftab.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}
.member-row{display:flex;align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);gap:10px;transition:background 0.1s;}
.member-row:last-child{border-bottom:none;}
.member-row:hover{background:var(--surface);}
.m-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.76rem;font-weight:700;color:#fff;flex-shrink:0;}
.m-info{flex:1;min-width:0;}
.m-name{font-size:0.87rem;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.m-time{font-size:0.72rem;color:var(--text3);margin-top:1px;}
.m-amount{font-size:0.87rem;font-weight:700;color:var(--text2);flex-shrink:0;}
.mark-btn{background:var(--green-light);border:1px solid #bbf7d0;color:var(--green);padding:4px 9px;border-radius:6px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;}
.mark-btn:hover{background:#bbf7d0;}
.del-member-btn{background:var(--red-light);border:1px solid #fecaca;color:var(--red);padding:4px 8px;border-radius:6px;font-size:0.7rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;flex-shrink:0;}
.del-member-btn:hover{background:#fecaca;}
.share-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.share-label{font-size:0.7rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;}
.share-url{background:var(--surface);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:0.78rem;color:var(--accent);word-break:break-all;margin-bottom:8px;}
.copy-btn{width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all 0.15s;}
.copy-btn:hover{background:var(--accent-dark);}
.progress-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.prog-dots{display:flex;flex-direction:column;gap:5px;margin-top:10px;}
.prog-dot-row{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--text2);}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.role-legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
/* Edit deadline inline */
.deadline-edit{display:flex;align-items:center;gap:6px;margin-top:4px;}
.deadline-edit select{padding:3px 6px;border:1.5px solid var(--border);border-radius:6px;font-size:0.78rem;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--white);}
.deadline-save-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:0.75rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
/* Overlay/Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(2px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.overlay.show{display:flex;}
.modal{background:var(--white);border-radius:16px;padding:26px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.15);animation:slideUp 0.2s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <a class="nav-item" href="pay.html"><span class="icon">💳</span>繳費頁範例</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
    <a class="nav-item" href="index.html"><span class="icon">🌐</span>首頁</a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">幹</div>
      <div class="user-info"><div class="user-name" id="userName">載入中</div><div class="user-role">社團幹部</div></div>
      <button class="logout-btn" onclick="PC_logout()">登出</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="breadcrumb"><a href="dashboard.html">總覽</a><span>›</span><span id="bcTitle">活動詳情</span></div>
  <div class="topbar">
    <div>
      <div class="page-title" id="evtTitle">載入中...</div>
      <div class="page-sub" id="evtDesc"></div>
      <!-- Deadline editor -->
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span style="font-size:0.82rem;color:var(--text2);">截止日期：</span>
        <span id="deadlineDisplay" style="font-size:0.82rem;font-weight:600;color:var(--text);"></span>
        <button onclick="toggleDeadlineEdit()" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:6px;font-size:0.73rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">✏️ 修改</button>
      </div>
      <div id="deadlineEditRow" style="display:none;margin-top:6px;" class="deadline-edit">
        <select id="dlYear"></select>
        <select id="dlMonth" onchange="updateDlDays()"></select>
        <select id="dlDay"></select>
        <button class="deadline-save-btn" onclick="saveDeadline()">儲存</button>
        <button onclick="toggleDeadlineEdit()" style="background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:6px;font-size:0.73rem;cursor:pointer;font-family:'Noto Sans TC',sans-serif;">取消</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn btn-ghost" onclick="sendReminder()">📣 發送催款</button>
      <button class="btn btn-ghost" onclick="location.href='report.html'">📄 報表</button>
      <button class="btn btn-primary" style="color:#fff" onclick="openAdd()">+ 新增成員</button>
    </div>
  </div>

  <div class="stats-row">
    <div class="sbox"><div class="sbox-label">實收金額</div><div class="sbox-val" id="sCollected" style="color:var(--green)">$0</div><div class="sbox-sub">已繳成員合計</div></div>
    <div class="sbox"><div class="sbox-label">應收金額</div><div class="sbox-val" id="sExpected">$0</div><div class="sbox-sub">繳費者總應收</div></div>
    <div class="sbox"><div class="sbox-label">待收金額</div><div class="sbox-val" id="sPending" style="color:var(--orange)">$0</div><div class="sbox-sub" id="sPendingSub"></div></div>
    <div class="sbox"><div class="sbox-label">截止倒數</div><div class="sbox-val" id="sDaysLeft" style="font-size:1.1rem;padding-top:4px">—</div><div class="sbox-sub" id="sDeadline"></div></div>
  </div>

  <div class="two-col">
    <div>
      <div class="section-card">
        <div class="sc-header">
          <div>
            <div class="sc-title">成員繳費狀態</div>
            <div class="role-legend" style="margin-top:4px;">
              <span class="badge badge-blue" style="font-size:0.68rem;">繳費者</span>
              <span class="badge badge-orange" style="font-size:0.68rem;">統計者</span>
              <span class="badge badge-gray" style="font-size:0.68rem;">觀察者</span>
            </div>
          </div>
          <div class="filter-row">
            <button class="ftab active" onclick="setFilter(this,'all')">全部</button>
            <button class="ftab" onclick="setFilter(this,'paid')">已繳</button>
            <button class="ftab" onclick="setFilter(this,'pending')">待繳</button>
            <button class="ftab" onclick="setFilter(this,'overdue')">逾期</button>
          </div>
        </div>
        <div id="memberList"></div>
      </div>
    </div>
    <div>
      <div class="progress-card">
        <div class="share-label">收款進度</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="font-size:0.85rem;color:var(--text2)">繳費率</div>
          <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800;" id="progPct">0%</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
        <div class="prog-dots">
          <div class="prog-dot-row"><div class="dot" style="background:var(--green)"></div>已繳：<strong id="progPaid">0</strong> 人</div>
          <div class="prog-dot-row"><div class="dot" style="background:var(--orange)"></div>待繳：<strong id="progPending">0</strong> 人</div>
          <div class="prog-dot-row"><div class="dot" style="background:var(--red)"></div>逾期：<strong id="progOverdue">0</strong> 人</div>
        </div>
      </div>
      <div class="share-card">
        <div class="share-label">🔗 成員繳費連結</div>
        <div class="share-url" id="shareUrl">—</div>
        <button class="copy-btn" onclick="copyLink()">複製連結</button>
        <a id="previewLink" href="#" target="_blank" class="btn btn-ghost" style="width:100%;margin-top:8px;justify-content:center;">預覽繳費頁面 →</a>
      </div>
    </div>
  </div>
</main>

<!-- ADD MEMBER MODAL -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <div class="modal-title">新增成員</div>
    <div class="form-group"><label class="form-label">姓名</label><input type="text" id="addName" class="form-input" placeholder="林小明" onkeydown="if(event.key==='Enter')addMember()"></div>
    <div class="form-group">
      <label class="form-label">角色</label>
      <select id="addRole" class="form-input" onchange="toggleCustomAmt()">
        <option value="payer">繳費者（需繳款）</option>
        <option value="counter">統計者（不需繳款）</option>
        <option value="observer">觀察者（不需繳款）</option>
      </select>
    </div>
    <div class="form-group" id="customAmtWrap" style="display:none">
      <label class="form-label">自訂金額（留空使用活動預設）</label>
      <input type="number" id="addCustomAmt" class="form-input" placeholder="0" min="0">
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeAdd()">取消</button>
      <button class="btn btn-primary" style="flex:2;color:#fff" onclick="addMember()">新增成員</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const user=PC_requireLogin();if(!user)throw new Error('redirect');
PC_fillSidebarUser();
const params=new URLSearchParams(location.search);
const eventId=params.get('id');
if(!eventId)location.href='dashboard.html';
let evt=null,currentFilter='all';

const ROLE_LABELS={payer:'繳費者',counter:'統計者',observer:'觀察者'};
const ROLE_COLORS={payer:'#4f6ef7',counter:'#d97706',observer:'#9ca3af'};
const ROLE_BADGE={payer:'badge-blue',counter:'badge-orange',observer:'badge-gray'};

function renderSidebar(){
  const evts=PC_getEvents();
  document.getElementById('sidebarEvents').innerHTML=evts.map(e=>`<a class="nav-event${e.id===eventId?' current':''}" href="event.html?id=${e.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`).join('');
}

function renderPage(){
  evt=PC_getEvent(eventId);if(!evt){location.href='dashboard.html';return;}
  document.title=evt.title+' — PayClub';
  document.getElementById('bcTitle').textContent=evt.title;
  document.getElementById('evtTitle').textContent=evt.title;
  document.getElementById('evtDesc').textContent=evt.desc||'';
  document.getElementById('deadlineDisplay').textContent=evt.deadline;

  const payers=PC_getPayers(evt);
  const paid=payers.filter(m=>m.status==='paid').length;
  const pending=payers.filter(m=>m.status==='pending').length;
  const overdue=payers.filter(m=>m.status==='overdue').length;
  const pct=payers.length?Math.round(paid/payers.length*100):0;
  const collected=PC_getCollected(evt),expected=PC_getExpected(evt);

  document.getElementById('sCollected').textContent='$'+collected.toLocaleString();
  document.getElementById('sExpected').textContent='$'+expected.toLocaleString();
  document.getElementById('sPending').textContent='$'+(expected-collected).toLocaleString();
  document.getElementById('sPendingSub').textContent=(pending+overdue)+' 人未繳';
  const dl=new Date(evt.deadline),days=Math.ceil((dl-new Date())/(1000*60*60*24));
  const dlEl=document.getElementById('sDaysLeft');
  dlEl.textContent=days>0?'剩 '+days+' 天':'已截止';
  dlEl.style.color=days<=3?'var(--red)':'inherit';
  document.getElementById('sDeadline').textContent=evt.deadline;

  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  if(pct===100)document.getElementById('progFill').classList.add('green');
  else document.getElementById('progFill').classList.remove('green');
  document.getElementById('progPaid').textContent=paid;
  document.getElementById('progPending').textContent=pending;
  document.getElementById('progOverdue').textContent=overdue;

  const payUrl=location.href.replace(/event\.html.*/,'')+'pay.html?event='+evt.id;
  document.getElementById('shareUrl').textContent=payUrl;
  document.getElementById('previewLink').href=payUrl;
  renderMembers();renderSidebar();
}

function renderMembers(){
  let members=evt.members||[];
  if(currentFilter==='paid') members=members.filter(m=>m.status==='paid');
  else if(currentFilter==='pending') members=members.filter(m=>m.status==='pending');
  else if(currentFilter==='overdue') members=members.filter(m=>m.status==='overdue');
  if(!members.length){document.getElementById('memberList').innerHTML='<div style="text-align:center;padding:28px;color:var(--text3);font-size:0.85rem;">沒有符合的成員</div>';return;}
  document.getElementById('memberList').innerHTML=members.map((m)=>{
    const realIdx=(evt.members||[]).indexOf(m);
    const amt=m.role==='payer'?'$'+PC_getExpectedAmount(evt,m):'—';
    const badgeCls=m.role!=='payer'?'badge-gray':(m.status==='paid'?'badge-green':m.status==='overdue'?'badge-red':'badge-orange');
    const badgeTxt=m.role!=='payer'?ROLE_LABELS[m.role]:(m.status==='paid'?'已繳費':m.status==='overdue'?'逾期未繳':'待繳費');
    return `<div class="member-row">
      <div class="m-av" style="background:${ROLE_COLORS[m.role]||'#9ca3af'}">${m.name?m.name.slice(0,1):'?'}</div>
      <div class="m-info">
        <div class="m-name">${m.name||'未知'} <span class="badge ${ROLE_BADGE[m.role]||'badge-gray'}" style="font-size:0.65rem;padding:1px 6px">${ROLE_LABELS[m.role]||m.role}</span></div>
        <div class="m-time">${m.paidAt||'—'}</div>
      </div>
      <div class="m-amount">${amt}</div>
      <span class="badge ${badgeCls}">${badgeTxt}</span>
      ${m.role==='payer'&&m.status!=='paid'?`<button class="mark-btn" onclick="markPaid(${realIdx})">✓ 標記</button>`:''}
      <button class="del-member-btn" onclick="deleteMember(${realIdx})">刪除</button>
    </div>`;
  }).join('');
}

function setFilter(el,f){currentFilter=f;document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));el.classList.add('active');renderMembers();}

function markPaid(idx){
  const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);
  e.members[idx].status='paid';e.members[idx].paidAt=PC_nowStr();
  PC_saveEvents(evts);renderPage();PC_toast('✅ 已標記繳費');
}

function deleteMember(idx){
  const name=(evt.members[idx]||{}).name||'此成員';
  if(!confirm('確定要移除「'+name+'」？'))return;
  const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);
  e.members.splice(idx,1);PC_saveEvents(evts);renderPage();PC_toast('已移除 '+name);
}

function copyLink(){navigator.clipboard.writeText(document.getElementById('shareUrl').textContent).catch(()=>{});PC_toast('🔗 連結已複製');}
function sendReminder(){const n=(evt.members||[]).filter(m=>m.role==='payer'&&m.status!=='paid').length;PC_toast('📣 已發送催款給 '+n+' 位未繳成員');}

// Deadline editor
function toggleDeadlineEdit(){
  const row=document.getElementById('deadlineEditRow');
  const show=row.style.display==='none';
  row.style.display=show?'flex':'none';
  if(show) initDlSelects();
}
function initDlSelects(){
  const [y,m,d]=(evt.deadline||'2026-01-01').split('-').map(Number);
  const cy=new Date().getFullYear();
  const yr=document.getElementById('dlYear');
  yr.innerHTML='';
  for(let i=cy;i<=cy+5;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'年';yr.appendChild(o);}
  yr.value=y;
  const mn=document.getElementById('dlMonth');
  mn.innerHTML='';
  for(let i=1;i<=12;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'月';mn.appendChild(o);}
  mn.value=m;
  updateDlDays(d);
}
function updateDlDays(setDay){
  const y=parseInt(document.getElementById('dlYear').value)||new Date().getFullYear();
  const m=parseInt(document.getElementById('dlMonth').value)||1;
  const days=new Date(y,m,0).getDate();
  const dd=document.getElementById('dlDay');
  const prev=setDay||parseInt(dd.value)||1;
  dd.innerHTML='';
  for(let i=1;i<=days;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'日';dd.appendChild(o);}
  dd.value=Math.min(prev,days);
}
function saveDeadline(){
  const y=document.getElementById('dlYear').value;
  const m=document.getElementById('dlMonth').value.padStart(2,'0');
  const d=document.getElementById('dlDay').value.padStart(2,'0');
  const newDl=`${y}-${m}-${d}`;
  const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);
  e.deadline=newDl;PC_saveEvents(evts);
  document.getElementById('deadlineEditRow').style.display='none';
  renderPage();PC_toast('✅ 截止日期已更新為 '+newDl);
}

// Add member
function openAdd(){document.getElementById('addName').value='';document.getElementById('addRole').value='payer';document.getElementById('addCustomAmt').value='';toggleCustomAmt();document.getElementById('addOverlay').classList.add('show');}
function closeAdd(){document.getElementById('addOverlay').classList.remove('show');}
document.getElementById('addOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAdd();});
function toggleCustomAmt(){document.getElementById('customAmtWrap').style.display=(evt&&evt.amountMode==='custom'&&document.getElementById('addRole').value==='payer')?'block':'none';}
function addMember(){
  const name=document.getElementById('addName').value.trim();
  const role=document.getElementById('addRole').value;
  if(!name){PC_toast('請輸入成員姓名');return;}
  const evts=PC_getEvents();const e=evts.find(x=>x.id===eventId);
  if((e.members||[]).find(m=>m.name===name)){PC_toast('已有同名成員');return;}
  let customAmount=null;
  if(e.amountMode==='custom'&&role==='payer'){customAmount=parseFloat(document.getElementById('addCustomAmt').value)||0;}
  if(!e.members)e.members=[];
  e.members.push({name,role,status:role==='payer'?'pending':'none',paidAt:'',customAmount});
  PC_saveEvents(evts);closeAdd();renderPage();PC_toast('✅ 已新增 '+name);
}

renderPage();
</script>
</body></html>
