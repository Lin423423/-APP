<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動詳情 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.content{max-width:1100px;width:100%;}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;}
.page-title{font-size:2rem;font-weight:800;color:var(--text);margin-bottom:8px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-sm);}
.stat-label{font-size:0.75rem;font-weight:700;color:var(--text3);margin-bottom:8px;text-transform:uppercase;}
.stat-value{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.75rem;font-weight:800;color:var(--text);line-height:1;}
.stat-value.g{color:var(--green);}.stat-sub{font-size:0.75rem;color:var(--text3);margin-top:8px;}
.main-grid{display:grid;grid-template-columns:1fr 320px;gap:24px;}
.member-row{display:flex;align-items:center;padding:14px 24px;background:var(--white);border-bottom:1px solid var(--border);transition:all 0.15s;}
.member-row:hover{background:var(--surface);}
.m-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:0.9rem;margin-right:12px;flex-shrink:0;}
.m-info{flex:1;min-width:0;}.m-name{font-weight:700;font-size:0.92rem;color:var(--text);margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.m-email{font-size:0.75rem;color:var(--text3);}.m-amount{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:0.95rem;color:var(--text);margin:0 16px;}
.share-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow-sm);}
.share-link-box{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:0.8rem;color:var(--text2);word-break:break-all;margin:12px 0;}
.member-ops{display:flex;gap:6px;margin-left:12px;}
.mark-btn, .del-btn{width:28px;height:28px;border-radius:6px;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
.mark-btn{background:var(--surface);color:var(--text3);}.mark-btn:hover{background:var(--accent-light);color:var(--accent);}
.del-btn{background:var(--surface);color:var(--text3);}.del-btn:hover{background:var(--red-light);color:var(--red);}
</style>
</head>
<body>

<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>
<nav class="mobile-nav">
  <div class="mobile-nav-logo"><span style="width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:4px"></span>PayClub</div>
  <button class="hamburger" onclick="openSidebar()">☰</button>
</nav>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item " href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="member.html"><span class="icon">🤝</span>加入活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
    <a class="nav-item" href="index.html"><span class="icon">🌐</span>首頁</a>
    <a class="nav-item " href="notifications.html" style="position:relative">
      <span class="icon">🔔</span>通知
      <span class="badge-notify" id="notifBadge" style="display:none">0</span>
    </a>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">載入中</div>
        <div class="user-role" id="userEmail" style="font-size:0.6rem;opacity:0.8">...</div>
      </div>
      <button class="logout-btn" onclick="PC_logout()">登出</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="content">
    <div class="breadcrumb" style="font-size:0.85rem;color:var(--text3);margin-bottom:20px;">總覽 › <span id="bcTitle">...</span></div>
    
    <div class="header-row">
      <div>
        <h1 class="page-title" id="evtTitle">...</h1>
        <p id="evtDesc" style="color:var(--text2);font-size:0.95rem;"></p>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-ghost" onclick="location.reload()" style="padding:8px 14px;font-size:0.8rem">🔄 更新</button>
        <button class="btn btn-primary" onclick="openAdd()" style="padding:8px 16px;font-size:0.8rem">+ 新增成員</button>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">實收</div><div id="sC" class="stat-value g">$0</div><div class="stat-sub">已繳合計</div></div>
      <div class="stat-card"><div class="stat-label">應收金額</div><div id="sE" class="stat-value">$0</div><div class="stat-sub">繳費者總應收</div></div>
      <div class="stat-card"><div class="stat-label">待收</div><div id="sP" class="stat-value" style="color:var(--orange)">$0</div><div id="sPsub" class="stat-sub">0 人未繳</div></div>
      <div class="stat-card"><div class="stat-label">截止倒數</div><div id="sDays" class="stat-value" style="font-size:1.5rem">--</div><div id="sDl" class="stat-sub">----/--/--</div></div>
    </div>

    <div class="main-grid">
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--white);">
            <div style="font-weight:700;">成員列表</div>
            <div class="dash-filter-wrap" style="background:var(--bg)">
                <button class="dash-filter-btn active" onclick="setCf('all',this)">全部</button>
                <button class="dash-filter-btn" onclick="setCf('paid',this)">已繳</button>
                <button class="dash-filter-btn" onclick="setCf('pending',this)">待繳</button>
            </div>
        </div>
        <div id="memberList"></div>
      </div>

      <div class="side-col">
        <div class="share-card">
          <h3 style="font-size:0.9rem;font-weight:700;margin-bottom:12px;">📊 收款進度</h3>
          <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
            <span style="font-size:0.75rem;color:var(--text3)">繳費率</span>
            <span id="progPct" style="font-weight:800;font-size:1.4rem;">0%</span>
          </div>
          <div class="progress-bar" style="height:10px;margin-bottom:20px;"><div id="progFill" class="progress-fill" style="width:0%"></div></div>
          <div style="display:grid;gap:10px;font-size:0.8rem;">
            <div style="display:flex;justify-content:space-between;"><span>已繳：</span><span id="pPaid">0 人</span></div>
            <div style="display:flex;justify-content:space-between;"><span>待繳：</span><span id="pPend">0 人</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="overlay" id="statusModalOverlay">
  <div class="modal" style="max-width:320px;">
    <div class="modal-title">⚙️ 調整繳費狀態</div>
    <div class="form-group">
      <label class="form-label">選擇新狀態</label>
      <select id="newStatusSelect" class="form-input">
        <option value="pending">待繳費</option>
        <option value="paid">已繳費</option>
        <option value="overdue">逾期</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeStatusModal()">取消</button>
      <button class="btn btn-primary" onclick="saveStatusChange()">儲存變更</button>
    </div>
  </div>
</div>

<div class="overlay" id="deleteConfirmOverlay">
  <div class="modal" style="max-width:320px; text-align:center;">
    <div style="font-size:2rem; margin-bottom:10px;">⚠️</div>
    <div class="modal-title">確定要刪除成員嗎？</div>
    <p style="font-size:0.85rem; color:var(--text2); margin-bottom:20px;">將移除「<span id="delTargetName" style="font-weight:700"></span>」的所有紀錄。</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeDeleteModal()">取消</button>
      <button class="btn btn-danger" style="flex:1" onclick="executeDelete()">確認刪除</button>
    </div>
  </div>
</div>

<script>
const eventId = new URLSearchParams(location.search).get('id');
let evt = null, cf = 'all', targetIdx = -1;

function renderPage(){
  evt = PC_getEvent(eventId);
  if(!evt){location.href='dashboard.html';return;}
  const u = PC_getUser();
  const isOwner = !evt.ownerEmail || evt.ownerEmail === u.email;

  document.getElementById('bcTitle').textContent = evt.title;
  document.getElementById('evtTitle').textContent = evt.title;
  document.getElementById('evtDesc').textContent = evt.desc||'';

  const p=PC_getPayers(evt),paid=p.filter(m=>m.status==='paid').length,pend=p.filter(m=>m.status==='pending').length;
  const c=PC_getCollected(evt),e=PC_getExpected(evt);
  const pct=p.length?Math.round(paid/p.length*100):0;
  
  document.getElementById('sC').textContent='$'+c.toLocaleString();
  document.getElementById('sE').textContent='$'+e.toLocaleString();
  document.getElementById('sP').textContent='$'+(e-c).toLocaleString();
  document.getElementById('sPsub').textContent=pend+' 人未繳';
  
  const dl=new Date(evt.deadline),days=Math.ceil((dl-new Date())/(1000*60*60*24));
  document.getElementById('sDays').textContent=days>0?'剩 '+days+' 天':'已截止';
  document.getElementById('sDl').textContent=evt.deadline;
  
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('pPaid').textContent=paid+' 人';
  document.getElementById('pPend').textContent=pend+' 人';

  renderMembers(isOwner);
}

function setCf(f,el){
  cf=f;
  document.querySelectorAll('.dash-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderPage();
}

function renderMembers(isOwner){
  let ms = evt.members||[];
  if(cf==='paid')ms=ms.filter(m=>m.status==='paid');
  else if(cf==='pending')ms=ms.filter(m=>m.status==='pending');

  const list = document.getElementById('memberList');
  if(!ms.length){list.innerHTML='<div style="padding:48px;text-align:center;color:var(--text3);">無資料</div>';return;}

  list.innerHTML=ms.map(m=>{
    const ri=(evt.members||[]).indexOf(m);
    const amt = m.role==='payer' || !m.role ? '$'+PC_getExpectedAmount(evt,m) : '—';
    const bc = m.status==='paid'?'badge-green':'badge-orange';
    const bt = m.status==='paid'?'已繳費':'待繳費';

    return `<div class="member-row">
        <div class="m-av" style="background:#94a3b8">${(m.name||m.email||'?')[0].toUpperCase()}</div>
        <div class="m-info"><div class="m-name">${m.name || m.email}</div><div class="m-email">${m.email}</div></div>
        <div class="m-amount">${amt}</div>
        <span class="badge ${bc}">${bt}</span>
        ${isOwner ? `
          <div class="member-ops">
            <button class="mark-btn" onclick="openStatusModal(${ri})">⚙️</button>
            <button class="del-btn" onclick="confirmDeleteMember(${ri})">✕</button>
          </div>
        ` : ''}
    </div>`;
  }).join('');
}

function openStatusModal(idx){
  targetIdx = idx;
  document.getElementById('newStatusSelect').value = evt.members[idx].status;
  document.getElementById('statusModalOverlay').classList.add('show');
}
function closeStatusModal(){document.getElementById('statusModalOverlay').classList.remove('show');}
function saveStatusChange(){
  evt.members[targetIdx].status = document.getElementById('newStatusSelect').value;
  evt.members[targetIdx].paidAt = (evt.members[targetIdx].status==='paid')?PC_nowStr():'';
  saveAndRefresh();
  closeStatusModal();
}
function confirmDeleteMember(idx){
  targetIdx = idx;
  document.getElementById('delTargetName').textContent = evt.members[idx].name || evt.members[idx].email;
  document.getElementById('deleteConfirmOverlay').classList.add('show');
}
function closeDeleteModal(){document.getElementById('deleteConfirmOverlay').classList.remove('show');}
function executeDelete(){
  evt.members.splice(targetIdx, 1);
  saveAndRefresh();
  closeDeleteModal();
}
function saveAndRefresh(){
  const all = PC_getEvents();
  PC_saveEvents(all.map(e => e.id === eventId ? evt : e));
  renderPage();
}
renderPage();
renderSidebar();
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show');}
function toggleSideMenu(id){document.getElementById(id).classList.toggle('open');document.getElementById(id+'_icon').classList.toggle('open');}
function renderSidebar(){
  const evts=PC_getAllMyEvents();
  const created=evts.filter(e=>e._isOwner);
  const joined=evts.filter(e=>!e._isOwner);
  const curId=(typeof eventId!=='undefined')?eventId:null;
  let html='';
  html+=`<div class="sidebar-menu-header" onclick="toggleSideMenu('mc')">已建立 <span class="chevron open" id="mc_icon">▼</span></div>`;
  html+=`<div class="sidebar-menu-list open" id="mc">`;
  if(!created.length)html+=`<div style="padding:4px 12px;font-size:0.74rem;color:var(--text3)">無</div>`;
  html+=created.map(e=>`<a class="nav-event${e.id===curId?' current':''}" href="event.html?id=${e.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`).join('');
  html+=`</div>`;
  html+=`<div class="sidebar-menu-header" onclick="toggleSideMenu('mj')">已加入 <span class="chevron open" id="mj_icon">▼</span></div>`;
  html+=`<div class="sidebar-menu-list open" id="mj">`;
  if(!joined.length)html+=`<div style="padding:4px 12px;font-size:0.74rem;color:var(--text3)">無</div>`;
  html+=joined.map(e=>`<a class="nav-event" href="member.html"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`).join('');
  html+=`</div>`;
  const c=document.getElementById('sidebarEvents');if(c)c.innerHTML=html;
  PC_fillSidebarUser();
}
</script>
</body>
</html>
