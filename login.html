<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="pc_auth.js"></script>
<style>
  :root { --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --accent:#5b5ef4; --accent2:#00e5c0; --text:#f0f0ff; --muted:#8888aa; --border:rgba(255,255,255,0.07); --err:#ff6b6b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; display:flex; }
  .left-panel { flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:60px; border-right:1px solid var(--border); position:relative; overflow:hidden; }
  .left-panel::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 30% 40%, rgba(91,94,244,0.15) 0%, transparent 70%); pointer-events:none; }
  .brand { position:relative; z-index:1; text-align:center; }
  .brand-logo { font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; letter-spacing:-0.04em; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:12px; }
  .logo-dot { width:14px; height:14px; background:var(--accent2); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5);opacity:0.7} }
  .brand-sub { color:var(--muted); font-size:1.05rem; line-height:1.7; max-width:300px; margin:0 auto 48px; }
  .feat-list { display:flex; flex-direction:column; gap:14px; text-align:left; width:100%; max-width:320px; }
  .feat-item { display:flex; align-items:center; gap:14px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:14px 18px; }
  .feat-item span:first-child { font-size:1.4rem; flex-shrink:0; }
  .feat-text strong { color:var(--text); display:block; font-size:0.9rem; margin-bottom:2px; }
  .feat-text small { color:var(--muted); font-size:0.8rem; }
  .right-panel { width:480px; display:flex; flex-direction:column; justify-content:center; padding:60px 52px; }
  .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:0.85rem; text-decoration:none; margin-bottom:36px; transition:color 0.2s; }
  .back-link:hover { color:var(--text); }
  .tabs { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:32px; }
  .tab { flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-size:0.9rem; font-weight:600; cursor:pointer; border-radius:9px; transition:all 0.2s; font-family:'Noto Sans TC',sans-serif; }
  .tab.active { background:var(--accent); color:#fff; }
  .form-title { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; letter-spacing:-0.03em; margin-bottom:6px; }
  .form-sub { color:var(--muted); font-size:0.88rem; margin-bottom:24px; }
  .demo-hint { background:rgba(0,229,192,0.07); border:1px solid rgba(0,229,192,0.2); border-radius:10px; padding:12px 16px; margin-bottom:20px; font-size:0.82rem; line-height:1.7; }
  .demo-hint strong { color:var(--accent2); }
  .demo-btn { background:rgba(0,229,192,0.12); border:1px solid rgba(0,229,192,0.25); color:var(--accent2); padding:4px 12px; border-radius:6px; font-size:0.78rem; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; display:inline-block; margin-top:6px; }
  .demo-btn:hover { background:rgba(0,229,192,0.22); }
  .form-group { margin-bottom:18px; }
  label { display:block; font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:7px; letter-spacing:0.05em; text-transform:uppercase; }
  input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:13px 16px; color:var(--text); font-size:0.95rem; font-family:'Noto Sans TC',sans-serif; outline:none; transition:border-color 0.2s; }
  input:focus { border-color:var(--accent); }
  input.err { border-color:var(--err); }
  .err-msg { color:var(--err); font-size:0.78rem; margin-top:5px; display:none; }
  .err-msg.show { display:block; }
  .role-label { font-size:0.78rem; font-weight:600; color:var(--muted); margin-bottom:8px; letter-spacing:0.05em; text-transform:uppercase; }
  .role-row { display:flex; gap:10px; margin-bottom:18px; }
  .role-btn { flex:1; padding:12px; border:1px solid var(--border); border-radius:10px; background:transparent; color:var(--muted); font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:'Noto Sans TC',sans-serif; }
  .role-btn.active { border-color:var(--accent); background:rgba(91,94,244,0.12); color:var(--accent); }
  .submit-btn { width:100%; padding:15px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; }
  .submit-btn:hover { background:#7b7ef8; transform:translateY(-1px); box-shadow:0 8px 24px rgba(91,94,244,0.4); }
  .divider { display:flex; align-items:center; gap:12px; margin:20px 0; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .divider span { font-size:0.78rem; color:var(--muted); }
  .google-btn { width:100%; padding:13px; background:transparent; color:var(--text); border:1px solid var(--border); border-radius:12px; font-size:0.92rem; font-weight:600; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:10px; }
  .google-btn:hover { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.04); }
  .toast { position:fixed; bottom:28px; right:28px; background:var(--card); border:1px solid rgba(0,229,192,0.25); border-radius:12px; padding:14px 20px; font-size:0.88rem; transform:translateY(60px); opacity:0; transition:all 0.3s; z-index:999; }
  .toast.show { transform:translateY(0); opacity:1; }
  @media(max-width:860px) { .left-panel{display:none} .right-panel{width:100%;padding:36px 28px} }
</style>
</head>
<body>
<div class="left-panel">
  <div class="brand">
    <div class="brand-logo"><div class="logo-dot"></div>PayClub</div>
    <p class="brand-sub">校園團體金流管理平台，讓幹部告別催款噩夢。</p>
    <div class="feat-list">
      <div class="feat-item"><span>🔗</span><div class="feat-text"><strong>一鍵收款連結</strong><small>生成連結，分享即可收款</small></div></div>
      <div class="feat-item"><span>📊</span><div class="feat-text"><strong>即時狀態追蹤</strong><small>誰繳了誰沒繳，一目瞭然</small></div></div>
      <div class="feat-item"><span>🔔</span><div class="feat-text"><strong>自動催款提醒</strong><small>讓系統幫你說難開口的話</small></div></div>
      <div class="feat-item"><span>📄</span><div class="feat-text"><strong>財務報表匯出</strong><small>PDF 一鍵生成，核銷免煩惱</small></div></div>
    </div>
  </div>
</div>
<div class="right-panel">
  <a href="index.html" class="back-link">← 返回首頁</a>
  <div class="tabs">
    <button class="tab active" id="tabLogin" onclick="switchTab('login')">登入</button>
    <button class="tab" id="tabReg" onclick="switchTab('register')">註冊</button>
  </div>

  <div id="loginForm">
    <div class="form-title">歡迎回來 👋</div>
    <div class="form-sub">登入後狀態持久保存，主動登出才會失效</div>
    <div class="demo-hint">
      🎮 <strong>Demo 帳號</strong><br>
      Email：demo@payclub.app　密碼：demo123<br>
      <button class="demo-btn" onclick="fillDemo()">⚡ 一鍵填入</button>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="lEmail" placeholder="your@email.com">
      <div class="err-msg" id="lEmailErr">請輸入有效的 Email</div>
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="lPwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()">
      <div class="err-msg" id="lPwdErr">密碼不得少於 6 個字元</div>
    </div>
    <button class="submit-btn" onclick="handleLogin()">登入 →</button>
    <div class="divider"><span>或</span></div>
    <button class="google-btn" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      使用 Google 帳號登入
    </button>
  </div>

  <div id="regForm" style="display:none">
    <div class="form-title">建立帳號 🚀</div>
    <div class="form-sub">註冊後登入狀態自動保存，不需重複登入</div>
    <div class="form-group"><label>姓名</label><input type="text" id="rName" placeholder="林小明"></div>
    <div class="form-group"><label>學校 Email</label><input type="email" id="rEmail" placeholder="b12345678@ntu.edu.tw"></div>
    <div class="form-group"><label>密碼（至少 6 字）</label><input type="password" id="rPwd" placeholder="••••••••"></div>
    <div class="role-label">你的身份</div>
    <div class="role-row">
      <button class="role-btn active" id="rLeader" onclick="setRole('leader')">👑 社團幹部</button>
      <button class="role-btn" id="rMember" onclick="setRole('member')">🎓 一般成員</button>
    </div>
    <button class="submit-btn" onclick="handleRegister()">建立帳號 →</button>
    <div class="divider"><span>或</span></div>
    <button class="google-btn" onclick="handleGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      使用 Google 帳號註冊
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
// Already logged in → redirect
if (PC_isLoggedIn()) {
  const p = new URLSearchParams(location.search);
  location.href = p.get('next') || 'dashboard.html';
}
const urlp = new URLSearchParams(location.search);
if (urlp.get('mode') === 'register') switchTab('register');

function switchTab(t) {
  document.getElementById('loginForm').style.display = t==='login'?'block':'none';
  document.getElementById('regForm').style.display   = t==='register'?'block':'none';
  document.getElementById('tabLogin').classList.toggle('active', t==='login');
  document.getElementById('tabReg').classList.toggle('active',   t==='register');
}
function fillDemo() {
  document.getElementById('lEmail').value = 'demo@payclub.app';
  document.getElementById('lPwd').value   = 'demo123';
}
let selectedRole = 'leader';
function setRole(r) {
  selectedRole = r;
  document.getElementById('rLeader').classList.toggle('active', r==='leader');
  document.getElementById('rMember').classList.toggle('active', r==='member');
}
function redirect(user) {
  PC_toast('✅ ' + user.name + '，登入成功！');
  const p = new URLSearchParams(location.search);
  setTimeout(() => location.href = p.get('next') || 'dashboard.html', 900);
}
function handleLogin() {
  const email = document.getElementById('lEmail').value.trim();
  const pwd   = document.getElementById('lPwd').value;
  let ok = true;
  if (!email||!email.includes('@')) { document.getElementById('lEmail').classList.add('err'); document.getElementById('lEmailErr').classList.add('show'); ok=false; }
  else { document.getElementById('lEmail').classList.remove('err'); document.getElementById('lEmailErr').classList.remove('show'); }
  if (pwd.length < 6) { document.getElementById('lPwd').classList.add('err'); document.getElementById('lPwdErr').classList.add('show'); ok=false; }
  else { document.getElementById('lPwd').classList.remove('err'); document.getElementById('lPwdErr').classList.remove('show'); }
  if (!ok) return;
  if (email==='demo@payclub.app' && pwd==='demo123') {
    localStorage.setItem('pc_current_user', JSON.stringify(DEMO_USER));
    return redirect(DEMO_USER);
  }
  const users = JSON.parse(localStorage.getItem('pc_users')||'[]');
  const user  = users.find(u => u.email===email && u.pwd===pwd);
  if (user) { localStorage.setItem('pc_current_user', JSON.stringify(user)); return redirect(user); }
  PC_toast('❌ Email 或密碼錯誤');
}
function handleRegister() {
  const name  = document.getElementById('rName').value.trim();
  const email = document.getElementById('rEmail').value.trim();
  const pwd   = document.getElementById('rPwd').value;
  if (!name||!email||!email.includes('@')||pwd.length<6) { PC_toast('❌ 請填寫所有欄位（密碼至少 6 字）'); return; }
  const users = JSON.parse(localStorage.getItem('pc_users')||'[]');
  if (users.find(u=>u.email===email)) { PC_toast('❌ 此 Email 已被使用'); return; }
  const newUser = {name,email,pwd,role:selectedRole};
  users.push(newUser);
  localStorage.setItem('pc_users', JSON.stringify(users));
  localStorage.setItem('pc_current_user', JSON.stringify(newUser));
  redirect(newUser);
}
function handleGoogle() {
  const u = {name:'Google 用戶',email:'user@ntu.edu.tw',role:'leader'};
  localStorage.setItem('pc_current_user', JSON.stringify(u));
  redirect(u);
}
</script>
</body>
</html>
