<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入 / 註冊 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --accent:#5b5ef4; --accent2:#00e5c0; --text:#f0f0ff; --muted:#8888aa; --border:rgba(255,255,255,0.07); --err:#ff6b6b; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; min-height:100vh; display:flex; }

  .left-panel { flex:1; background:linear-gradient(135deg,rgba(91,94,244,0.15) 0%,rgba(0,229,192,0.08) 100%); border-right:1px solid var(--border); display:flex; flex-direction:column; justify-content:center; align-items:center; padding:60px; position:relative; overflow:hidden; }
  .left-panel::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 30% 40%,rgba(91,94,244,0.2) 0%,transparent 70%); }
  .brand { position:relative; z-index:1; text-align:center; }
  .brand-logo { font-family:'Syne',sans-serif; font-size:3rem; font-weight:800; letter-spacing:-0.04em; margin-bottom:16px; display:flex; align-items:center; justify-content:center; gap:12px; }
  .logo-dot { width:14px; height:14px; background:var(--accent2); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4);opacity:0.7} }
  .brand-sub { color:var(--muted); font-size:1.1rem; line-height:1.7; max-width:320px; margin:0 auto 48px; }
  .features-list { display:flex; flex-direction:column; gap:16px; text-align:left; width:100%; max-width:320px; }
  .feat-item { display:flex; align-items:center; gap:14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:12px; padding:14px 18px; }
  .feat-item span:first-child { font-size:1.4rem; flex-shrink:0; }
  .feat-item-text { font-size:0.88rem; color:var(--muted); line-height:1.5; }
  .feat-item-text strong { color:var(--text); display:block; margin-bottom:2px; font-size:0.92rem; }

  .right-panel { width:480px; display:flex; flex-direction:column; justify-content:center; padding:60px 56px; }
  .back-link { display:inline-flex; align-items:center; gap:8px; color:var(--muted); font-size:0.85rem; text-decoration:none; margin-bottom:40px; transition:color 0.2s; }
  .back-link:hover { color:var(--text); }

  .tab-switcher { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:36px; }
  .tab-btn { flex:1; padding:10px; border:none; background:transparent; color:var(--muted); font-size:0.9rem; font-weight:600; cursor:pointer; border-radius:9px; transition:all 0.2s; font-family:'Noto Sans TC',sans-serif; }
  .tab-btn.active { background:var(--accent); color:#fff; }

  .form-title { font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800; letter-spacing:-0.03em; margin-bottom:8px; }
  .form-sub { color:var(--muted); font-size:0.9rem; margin-bottom:32px; }

  .form-group { margin-bottom:20px; }
  label { display:block; font-size:0.82rem; font-weight:600; color:var(--muted); margin-bottom:8px; letter-spacing:0.04em; text-transform:uppercase; }
  input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; color:var(--text); font-size:0.95rem; font-family:'Noto Sans TC',sans-serif; outline:none; transition:border-color 0.2s; }
  input:focus { border-color:var(--accent); }
  input.error { border-color:var(--err); }
  .err-msg { color:var(--err); font-size:0.78rem; margin-top:6px; display:none; }
  .err-msg.show { display:block; }

  .role-selector { display:flex; gap:12px; margin-bottom:20px; }
  .role-btn { flex:1; padding:12px; border:1px solid var(--border); border-radius:10px; background:transparent; color:var(--muted); font-size:0.85rem; font-weight:600; cursor:pointer; text-align:center; transition:all 0.2s; font-family:'Noto Sans TC',sans-serif; }
  .role-btn.active { border-color:var(--accent); background:rgba(91,94,244,0.12); color:var(--accent); }
  .role-label { font-size:0.75rem; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; font-weight:600; }

  .submit-btn { width:100%; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .submit-btn:hover { background:#7b7ef8; transform:translateY(-1px); box-shadow:0 8px 24px rgba(91,94,244,0.4); }

  .divider { display:flex; align-items:center; gap:12px; margin:24px 0; }
  .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .divider span { font-size:0.8rem; color:var(--muted); }

  .google-btn { width:100%; padding:14px; background:transparent; color:var(--text); border:1px solid var(--border); border-radius:12px; font-size:0.95rem; font-weight:600; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:10px; }
  .google-btn:hover { border-color:rgba(255,255,255,0.2); background:rgba(255,255,255,0.04); }

  .toast { position:fixed; bottom:32px; right:32px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px 20px; font-size:0.9rem; display:flex; align-items:center; gap:10px; transform:translateY(80px); opacity:0; transition:all 0.3s; z-index:999; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
  .toast.show { transform:translateY(0); opacity:1; }
  .toast.success { border-color:rgba(0,229,192,0.3); }
  .toast.error { border-color:rgba(255,107,107,0.3); }

  @media(max-width:900px) { .left-panel { display:none; } .right-panel { width:100%; padding:40px 32px; } }
</style>
</head>
<body>

<div class="left-panel">
  <div class="brand">
    <div class="brand-logo"><div class="logo-dot"></div>PayClub</div>
    <p class="brand-sub">校園團體金流管理平台，讓幹部從此告別催款噩夢。</p>
    <div class="features-list">
      <div class="feat-item"><span>🔗</span><div class="feat-item-text"><strong>一鍵收款連結</strong>生成連結，分享即可收款</div></div>
      <div class="feat-item"><span>📊</span><div class="feat-item-text"><strong>即時狀態追蹤</strong>誰繳了誰沒繳，一目瞭然</div></div>
      <div class="feat-item"><span>🔔</span><div class="feat-item-text"><strong>自動催款提醒</strong>讓系統幫你說難開口的話</div></div>
      <div class="feat-item"><span>📄</span><div class="feat-item-text"><strong>財務報表匯出</strong>PDF 一鍵生成，核銷免煩惱</div></div>
    </div>
  </div>
</div>

<div class="right-panel">
  <a href="index.html" class="back-link">← 返回首頁</a>

  <div class="tab-switcher">
    <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">登入</button>
    <button class="tab-btn" id="registerTab" onclick="switchTab('register')">註冊</button>
  </div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <div class="form-title">歡迎回來 👋</div>
    <div class="form-sub">登入你的 PayClub 帳號</div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="your@email.com">
      <div class="err-msg" id="loginEmailErr">請輸入有效的 Email</div>
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="loginPwd" placeholder="••••••••">
      <div class="err-msg" id="loginPwdErr">密碼不得少於 6 個字元</div>
    </div>
    <button class="submit-btn" onclick="handleLogin()">登入 →</button>
    <div class="divider"><span>或</span></div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      使用 Google 帳號登入
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none">
    <div class="form-title">建立帳號 🚀</div>
    <div class="form-sub">加入 PayClub，開始管理你的社團金流</div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="regName" placeholder="林小明">
    </div>
    <div class="form-group">
      <label>學校 Email</label>
      <input type="email" id="regEmail" placeholder="b12345678@ntu.edu.tw">
      <div class="err-msg" id="regEmailErr">請輸入學校 Email</div>
    </div>
    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="regPwd" placeholder="至少 6 個字元">
    </div>
    <div class="role-label">你的身份</div>
    <div class="role-selector">
      <button class="role-btn active" id="roleLeader" onclick="selectRole('leader')">👑 社團幹部</button>
      <button class="role-btn" id="roleMember" onclick="selectRole('member')">🎓 一般成員</button>
    </div>
    <button class="submit-btn" onclick="handleRegister()">建立帳號 →</button>
    <div class="divider"><span>或</span></div>
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.71c-.18-.54-.282-1.117-.282-1.71s.102-1.17.282-1.71V4.958H.957C.347 6.173 0 7.548 0 9s.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/></svg>
      使用 Google 帳號註冊
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const params = new URLSearchParams(location.search);
if(params.get('mode')==='register') switchTab('register');

function switchTab(tab){
  document.getElementById('loginForm').style.display = tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display = tab==='register'?'block':'none';
  document.getElementById('loginTab').classList.toggle('active', tab==='login');
  document.getElementById('registerTab').classList.toggle('active', tab==='register');
}

let selectedRole = 'leader';
function selectRole(r){
  selectedRole = r;
  document.getElementById('roleLeader').classList.toggle('active', r==='leader');
  document.getElementById('roleMember').classList.toggle('active', r==='member');
}

function showToast(msg, type='success'){
  const t = document.getElementById('toast');
  t.innerHTML = (type==='success'?'✅ ':'❌ ') + msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>t.className='toast',3000);
}

function handleLogin(){
  const email = document.getElementById('loginEmail').value;
  const pwd   = document.getElementById('loginPwd').value;
  let ok = true;
  if(!email||!email.includes('@')){ document.getElementById('loginEmail').classList.add('error'); document.getElementById('loginEmailErr').classList.add('show'); ok=false; } else { document.getElementById('loginEmail').classList.remove('error'); document.getElementById('loginEmailErr').classList.remove('show'); }
  if(pwd.length<6){ document.getElementById('loginPwd').classList.add('error'); document.getElementById('loginPwdErr').classList.add('show'); ok=false; } else { document.getElementById('loginPwd').classList.remove('error'); document.getElementById('loginPwdErr').classList.remove('show'); }
  if(!ok) return;
  // Check demo accounts
  const users = JSON.parse(localStorage.getItem('pc_users')||'[]');
  const user = users.find(u=>u.email===email && u.pwd===pwd);
  // Also allow demo account
  if(user || (email==='demo@payclub.app' && pwd==='demo123')){
    const u = user || {name:'Demo 幹部', email:'demo@payclub.app', role:'leader'};
    localStorage.setItem('pc_current_user', JSON.stringify(u));
    showToast('登入成功！正在跳轉...');
    setTimeout(()=>location.href='dashboard.html',1200);
  } else {
    showToast('Email 或密碼錯誤', 'error');
  }
}

function handleRegister(){
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pwd   = document.getElementById('regPwd').value;
  if(!name||!email||!email.includes('@')||pwd.length<6){ showToast('請填寫所有欄位', 'error'); return; }
  const users = JSON.parse(localStorage.getItem('pc_users')||'[]');
  if(users.find(u=>u.email===email)){ showToast('此 Email 已被使用', 'error'); return; }
  const newUser = {name, email, pwd, role:selectedRole};
  users.push(newUser);
  localStorage.setItem('pc_users', JSON.stringify(users));
  localStorage.setItem('pc_current_user', JSON.stringify(newUser));
  showToast('帳號建立成功！正在跳轉...');
  setTimeout(()=>location.href='dashboard.html',1200);
}

function handleGoogleLogin(){
  const mockUser = {name:'Google 用戶', email:'user@ntu.edu.tw', role:'leader'};
  localStorage.setItem('pc_current_user', JSON.stringify(mockUser));
  showToast('Google 登入成功！');
  setTimeout(()=>location.href='dashboard.html',1200);
}
</script>
</body>
</html>
