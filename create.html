<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建立活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="pc_auth.js"></script>
<style>
body{display:flex;}
.content{max-width:720px;}
.steps{display:flex;align-items:center;gap:0;margin-bottom:32px;}
.step-item{display:flex;align-items:center;gap:8px;flex:1;}
.step-circle{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:700;color:var(--text3);transition:all 0.25s;flex-shrink:0;}
.step-item.active .step-circle{border-color:var(--accent);background:var(--accent);color:#fff;}
.step-item.done .step-circle{border-color:var(--green);background:var(--green);color:#fff;}
.step-label{font-size:0.82rem;font-weight:600;color:var(--text3);}
.step-item.active .step-label{color:var(--accent);}
.step-item.done .step-label{color:var(--green);}
.step-line{flex:1;height:2px;background:var(--border);margin:0 8px;}
.step-line.done{background:var(--green);}

.form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px;box-shadow:var(--shadow);}
.form-card-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1rem;font-weight:700;margin-bottom:22px;display:flex;align-items:center;gap:8px;}

/* Amount mode toggle */
.amount-mode{display:flex;gap:0;background:var(--surface);border-radius:9px;padding:3px;margin-bottom:16px;}
.amt-tab{flex:1;padding:9px;border:none;background:transparent;color:var(--text2);font-size:0.85rem;font-weight:600;cursor:pointer;border-radius:7px;transition:all 0.15s;font-family:'Noto Sans TC',sans-serif;text-align:center;}
.amt-tab.active{background:var(--white);color:var(--text);box-shadow:var(--shadow);}

/* Date selects */
.date-selects{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

/* Reminder chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.chip{padding:6px 14px;border-radius:100px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);transition:all 0.15s;user-select:none;font-family:'Noto Sans TC',sans-serif;}
.chip.selected{border-color:var(--accent);background:var(--accent-light);color:var(--accent);}

/* Member builder */
.member-add-row{display:flex;gap:8px;margin-bottom:12px;}
.member-add-row input{flex:1;}
.role-select{min-width:100px;}
.member-list{display:flex;flex-direction:column;gap:6px;}
.member-tag{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 14px;}
.member-tag-left{display:flex;align-items:center;gap:10px;}
.member-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.76rem;font-weight:700;color:#fff;flex-shrink:0;}
.member-name{font-size:0.87rem;font-weight:600;}
.member-role-badge{font-size:0.7rem;padding:2px 8px;border-radius:100px;font-weight:600;}
.role-payer{background:var(--accent-light);color:var(--accent);}
.role-counter{background:var(--orange-light);color:var(--orange);}
.role-observer{background:var(--surface);color:var(--text3);}
.member-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:2px;line-height:1;transition:color 0.15s;}
.member-remove:hover{color:var(--red);}
.amount-input-wrap{display:flex;align-items:center;gap:8px;}
.amount-input-wrap span{color:var(--text3);font-size:0.82rem;}

/* Preview */
.preview-table{width:100%;border-collapse:collapse;font-size:0.87rem;}
.preview-table th{background:var(--surface);padding:9px 14px;font-size:0.76rem;font-weight:700;color:var(--text2);text-align:left;text-transform:uppercase;letter-spacing:0.04em;}
.preview-table td{padding:10px 14px;border-bottom:1px solid var(--border);}
.preview-table tr:last-child td{border-bottom:none;}

/* Success */
.success-box{background:var(--green-light);border:1px solid #bbf7d0;border-radius:var(--radius);padding:32px;text-align:center;}
.success-icon{font-size:2.5rem;margin-bottom:12px;}
.link-box{background:var(--white);border:1.5px solid var(--border);border-radius:9px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin:16px 0;text-align:left;}
.link-url{font-size:0.82rem;color:var(--accent);flex:1;word-break:break-all;}
.copy-btn{background:var(--accent);color:#fff;border:none;padding:7px 14px;border-radius:7px;font-size:0.78rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Noto Sans TC',sans-serif;}
</style>
</head>
<body>
<div class="mobile-overlay" id="mobileOverlay" onclick="closeSidebar()"></div>
<nav class="mobile-nav">
  <div class="mobile-nav-logo"><span style="width:7px;height:7px;background:var(--accent);border-radius:50%;display:inline-block;margin-right:4px"></span>PayClub</div>
  <button class="hamburger" onclick="openSidebar()">☰</button>
</nav>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span class="icon">🏠</span>總覽</a>
    <a class="nav-item active" href="create.html"><span class="icon">➕</span>建立活動</a>
    <a class="nav-item" href="report.html"><span class="icon">📊</span>財務報表</a>
    <a class="nav-item" href="pay.html"><span class="icon">💳</span>繳費頁範例</a>
    <div class="nav-section">我的活動</div>
    <div id="sidebarEvents"></div>
  </nav>
  <div class="sidebar-bottom">
    <div class="user-card">
      <div class="avatar" id="avatarInitial">幹</div>
      <div class="user-info"><div class="user-name" id="userName">載入中</div><div class="user-role">社團幹部</div></div>
      <button class="logout-btn" onclick="PC_logout()">登出</button>
    </div>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div><div class="page-title">建立收款活動</div><div class="page-sub">填寫資訊，系統自動生成收款連結</div></div>
  </div>

  <!-- STEPS -->
  <div class="steps" id="stepsBar">
    <div class="step-item active" id="stepItem1"><div class="step-circle">1</div><div class="step-label">活動資訊</div></div>
    <div class="step-line" id="stepLine1"></div>
    <div class="step-item" id="stepItem2"><div class="step-circle">2</div><div class="step-label">成員設定</div></div>
    <div class="step-line" id="stepLine2"></div>
    <div class="step-item" id="stepItem3"><div class="step-circle">3</div><div class="step-label">確認建立</div></div>
  </div>

  <div class="content">
    <!-- STEP 1 -->
    <div id="s1">
      <div class="form-card">
        <div class="form-card-title">📋 活動基本資訊</div>
        <div class="form-group"><label class="form-label">活動名稱 *</label><input type="text" id="s1Title" class="form-input" placeholder="例：2025 迎新活動費用"></div>

        <!-- Amount mode -->
        <div class="form-group">
          <label class="form-label">收款金額設定 *</label>
          <div class="amount-mode">
            <button class="amt-tab active" id="tabPerPerson" onclick="setAmtMode('per_person')">每人固定金額</button>
            <button class="amt-tab" id="tabCustom" onclick="setAmtMode('custom')">各自設定金額</button>
          </div>
          <div id="perPersonInput">
            <input type="number" id="s1Amount" class="form-input" placeholder="例：300（每人應繳）" min="1">
            <div style="font-size:0.76rem;color:var(--text3);margin-top:5px;">每位繳費成員應繳相同金額</div>
          </div>
          <div id="customInput" style="display:none">
            <div style="font-size:0.82rem;color:var(--text2);background:var(--orange-light);border-radius:8px;padding:10px 14px;border:1px solid #fde68a;">💡 選擇此模式後，可在成員設定中為每人指定不同金額</div>
          </div>
        </div>

        <!-- Date selects -->
        <div class="form-group">
          <label class="form-label">截止日期 *</label>
          <div class="date-selects">
            <select id="dlYear" class="form-input" onchange="updateDayOptions()"><option value="">年</option></select>
            <select id="dlMonth" class="form-input" onchange="updateDayOptions()"><option value="">月</option></select>
            <select id="dlDay" class="form-input"><option value="">日</option></select>
          </div>
        </div>

        <div class="form-group"><label class="form-label">活動說明</label><textarea id="s1Desc" class="form-input" rows="2" placeholder="成員繳費時會看到這段說明..."></textarea></div>

        <div class="form-group">
          <label class="form-label">自動催款提醒</label>
          <div class="chips">
            <div class="chip selected" onclick="this.classList.toggle('selected')">截止前 7 天</div>
            <div class="chip selected" onclick="this.classList.toggle('selected')">截止前 3 天</div>
            <div class="chip selected" onclick="this.classList.toggle('selected')">截止前 1 天</div>
            <div class="chip" onclick="this.classList.toggle('selected')">截止當天</div>
          </div>
        </div>
      </div>
      <button class="btn btn-primary" onclick="goStep2()">下一步：設定成員 →</button>
    </div>

    <!-- STEP 2 -->
    <div id="s2" style="display:none">
      <div class="form-card">
        <div class="form-card-title">👥 成員名單</div>
        <div style="font-size:0.82rem;color:var(--text2);margin-bottom:14px;background:var(--surface);border-radius:8px;padding:10px 14px;">
          成員分為三種角色：<strong>繳費者</strong>（需繳款）、<strong>統計者</strong>（負責記帳，不需繳款）、<strong>觀察者</strong>（查看用，不需繳款）
        </div>
        <div class="member-add-row">
          <input type="text" id="addName" class="form-input" placeholder="輸入姓名" onkeydown="if(event.key==='Enter')addMember()">
          <select id="addRole" class="form-input role-select">
            <option value="payer">繳費者</option>
            <option value="counter">統計者</option>
            <option value="observer">觀察者</option>
          </select>
          <div id="addAmountWrap" style="display:none">
            <input type="number" id="addAmount" class="form-input" placeholder="金額" min="0" style="width:90px">
          </div>
          <button class="btn btn-primary" onclick="addMember()">+ 新增</button>
        </div>
        <div class="member-list" id="memberList">
          <div style="text-align:center;padding:24px;color:var(--text3);font-size:0.85rem;">尚未新增任何成員</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-ghost" onclick="goStep(1)">← 上一步</button>
        <button class="btn btn-primary" style="flex:1" onclick="goStep3()">下一步：確認建立 →</button>
      </div>
    </div>

    <!-- STEP 3 -->
    <div id="s3" style="display:none">
      <div class="form-card">
        <div class="form-card-title">✅ 確認活動資訊</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;" id="previewInfo"></div>
        <div style="font-size:0.8rem;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em;">成員名單</div>
        <table class="preview-table">
          <thead><tr><th>姓名</th><th>角色</th><th>應繳金額</th></tr></thead>
          <tbody id="previewMembers"></tbody>
        </table>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-ghost" onclick="goStep(2)">← 上一步</button>
        <button class="btn btn-primary" style="flex:1" onclick="submitCreate()">🚀 建立活動並生成連結</button>
      </div>
    </div>

    <!-- SUCCESS -->
    <div id="sSuccess" style="display:none">
      <div class="success-box">
        <div class="success-icon">🎉</div>
        <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:6px;">活動建立成功！</div>
        <div style="color:var(--green);font-size:0.9rem;margin-bottom:4px;">分享以下連結給成員線上繳費</div>
        <div class="link-box">
          <div class="link-url" id="generatedLink">—</div>
          <button class="copy-btn" onclick="copyLink()">複製</button>
        </div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:4px;">
          <button class="btn btn-ghost" onclick="location.href='dashboard.html'">回總覽</button>
          <button class="btn btn-primary" onclick="goToEvent()">查看活動頁面 →</button>
        </div>
      </div>
    </div>
  </div>
</main>
<div class="toast" id="toast"></div>
<script>
function openSidebar(){document.getElementById("sidebar").classList.add("open");document.getElementById("mobileOverlay").classList.add("show");}
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("mobileOverlay").classList.remove("show");}
const user=PC_requireLogin();if(!user)throw new Error('redirect');
PC_fillSidebarUser();

// Sidebar
function renderSidebar(){
  const evts=PC_getEvents();
  document.getElementById('sidebarEvents').innerHTML=evts.map(e=>`<a class="nav-event" href="event.html?id=${e.id}"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${e.title}</span></a>`).join('');
}
renderSidebar();

// Date dropdowns
(function initDates(){
  const cy=new Date().getFullYear();
  const yr=document.getElementById('dlYear');
  for(let y=cy;y<=cy+3;y++){const o=document.createElement('option');o.value=y;o.textContent=y+'年';yr.appendChild(o);}
  yr.value=cy;
  const mn=document.getElementById('dlMonth');
  for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.textContent=m+'月';mn.appendChild(o);}
  mn.value=new Date().getMonth()+1;
  updateDayOptions();
  // default to 14 days from now
  const dl=new Date(); dl.setDate(dl.getDate()+14);
  document.getElementById('dlYear').value=dl.getFullYear();
  document.getElementById('dlMonth').value=dl.getMonth()+1;
  updateDayOptions();
  document.getElementById('dlDay').value=dl.getDate();
})();

function updateDayOptions(){
  const y=parseInt(document.getElementById('dlYear').value)||new Date().getFullYear();
  const m=parseInt(document.getElementById('dlMonth').value)||1;
  const days=new Date(y,m,0).getDate();
  const dd=document.getElementById('dlDay');
  const prev=dd.value;
  dd.innerHTML='<option value="">日</option>';
  for(let d=1;d<=days;d++){const o=document.createElement('option');o.value=d;o.textContent=d+'日';dd.appendChild(o);}
  if(prev&&parseInt(prev)<=days)dd.value=prev;
}

// Amount mode
let amtMode='per_person';
function setAmtMode(m){
  amtMode=m;
  document.getElementById('tabPerPerson').classList.toggle('active',m==='per_person');
  document.getElementById('tabCustom').classList.toggle('active',m==='custom');
  document.getElementById('perPersonInput').style.display=m==='per_person'?'block':'none';
  document.getElementById('customInput').style.display=m==='custom'?'block':'none';
  document.getElementById('addAmountWrap').style.display=m==='custom'?'flex':'none';
}

// Members
let members=[];
const ROLE_LABELS={payer:'繳費者',counter:'統計者',observer:'觀察者'};
const ROLE_COLORS={payer:'#4f6ef7',counter:'#d97706',observer:'#9ca3af'};
const ROLE_BADGE={payer:'role-payer',counter:'role-counter',observer:'role-observer'};

function addMember(){
  const name=document.getElementById('addName').value.trim();
  const role=document.getElementById('addRole').value;
  if(!name){PC_toast('請輸入成員姓名');return;}
  if(members.find(m=>m.name===name)){PC_toast('已有同名成員');return;}
  let customAmount=null;
  if(amtMode==='custom'&&role==='payer'){
    customAmount=parseFloat(document.getElementById('addAmount').value)||0;
  }
  members.push({name,role,status:'pending',paidAt:'',customAmount});
  document.getElementById('addName').value='';
  document.getElementById('addAmount').value='';
  renderMemberList();
}

function removeMember(i){members.splice(i,1);renderMemberList();}

function renderMemberList(){
  const list=document.getElementById('memberList');
  if(!members.length){list.innerHTML='<div style="text-align:center;padding:24px;color:var(--text3);font-size:0.85rem;">尚未新增任何成員</div>';return;}
  list.innerHTML=members.map((m,i)=>`
    <div class="member-tag">
      <div class="member-tag-left">
        <div class="member-avatar" style="background:${ROLE_COLORS[m.role]}">${m.name.slice(0,1)}</div>
        <div class="member-name">${m.name}</div>
        <span class="member-role-badge ${ROLE_BADGE[m.role]}">${ROLE_LABELS[m.role]}</span>
        ${m.customAmount!=null?`<span style="font-size:0.8rem;color:var(--text2)">$${m.customAmount}</span>`:''}
      </div>
      <button class="member-remove" onclick="removeMember(${i})">✕</button>
    </div>`).join('');
}

// Step navigation
function goStep(n){
  [1,2,3].forEach(i=>{
    document.getElementById('s'+i).style.display=i===n?'block':'none';
    const item=document.getElementById('stepItem'+i);
    item.className='step-item'+(i<n?' done':i===n?' active':'');
    if(i<3)document.getElementById('stepLine'+i).className='step-line'+(i<n?' done':'');
  });
  document.getElementById('sSuccess').style.display='none';
}

function goStep2(){
  const title=document.getElementById('s1Title').value.trim();
  const y=document.getElementById('dlYear').value,mo=document.getElementById('dlMonth').value,d=document.getElementById('dlDay').value;
  if(!title){PC_toast('請填寫活動名稱');return;}
  if(amtMode==='per_person'&&!document.getElementById('s1Amount').value){PC_toast('請填寫每人金額');return;}
  if(!y||!mo||!d){PC_toast('請選擇完整截止日期');return;}
  goStep(2);
}

function goStep3(){
  const y=document.getElementById('dlYear').value,mo=document.getElementById('dlMonth').value.padStart(2,'0'),d=document.getElementById('dlDay').value.padStart(2,'0');
  const deadline=`${y}-${mo}-${d}`;
  const amount=parseFloat(document.getElementById('s1Amount').value)||0;
  document.getElementById('previewInfo').innerHTML=`
    <div style="background:var(--surface);border-radius:9px;padding:14px"><div style="font-size:0.72rem;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:4px">活動名稱</div><div style="font-weight:700">${document.getElementById('s1Title').value}</div></div>
    <div style="background:var(--surface);border-radius:9px;padding:14px"><div style="font-size:0.72rem;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:4px">截止日期</div><div style="font-weight:700">${deadline}</div></div>
    <div style="background:var(--surface);border-radius:9px;padding:14px"><div style="font-size:0.72rem;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:4px">金額模式</div><div style="font-weight:700">${amtMode==='per_person'?'每人 $'+amount:'各自設定'}</div></div>
    <div style="background:var(--surface);border-radius:9px;padding:14px"><div style="font-size:0.72rem;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:4px">繳費成員數</div><div style="font-weight:700">${members.filter(m=>m.role==='payer').length} 人</div></div>`;
  document.getElementById('previewMembers').innerHTML=members.map(m=>{
    const amt=m.role==='payer'?(amtMode==='custom'&&m.customAmount!=null?'$'+m.customAmount:'$'+amount):'—';
    return `<tr><td style="font-weight:600">${m.name}</td><td><span class="badge ${m.role==='payer'?'badge-blue':m.role==='counter'?'badge-orange':'badge-gray'}">${ROLE_LABELS[m.role]}</span></td><td style="font-weight:700;color:var(--green)">${amt}</td></tr>`;
  }).join('');
  goStep(3);
}

let createdId=null;
function submitCreate(){
  const title=document.getElementById('s1Title').value.trim();
  const y=document.getElementById('dlYear').value,mo=document.getElementById('dlMonth').value.padStart(2,'0'),d=document.getElementById('dlDay').value.padStart(2,'0');
  const deadline=`${y}-${mo}-${d}`;
  const desc=document.getElementById('s1Desc').value.trim();
  const amount=parseFloat(document.getElementById('s1Amount').value)||0;
  const evts=PC_getEvents();
  createdId='e'+Date.now();
  const newEvt={id:createdId,title,amountMode:amtMode,amount,deadline,desc,status:'active',members:members.map(m=>({...m,status:m.role==='payer'?'pending':'none',paidAt:''}))};
  evts.unshift(newEvt); PC_saveEvents(evts);
  const link=location.href.replace('create.html','pay.html')+'?event='+createdId;
  document.getElementById('generatedLink').textContent=link;
  [1,2,3].forEach(i=>{document.getElementById('s'+i).style.display='none';document.getElementById('stepItem'+i).className='step-item done';if(i<3)document.getElementById('stepLine'+i).className='step-line done';});
  document.getElementById('sSuccess').style.display='block';
}

function copyLink(){navigator.clipboard.writeText(document.getElementById('generatedLink').textContent).catch(()=>{});PC_toast('🔗 連結已複製');}
function goToEvent(){location.href='event.html?id='+createdId;}
</script>
</body></html>
