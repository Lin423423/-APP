<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建立活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0f; --surface:#12121a; --card:#1a1a26; --accent:#5b5ef4; --accent2:#00e5c0; --text:#f0f0ff; --muted:#8888aa; --border:rgba(255,255,255,0.07); }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; display:flex; min-height:100vh; }

  .sidebar { width:240px; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; bottom:0; left:0; z-index:50; }
  .sidebar-logo { padding:28px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; letter-spacing:-0.02em; }
  .logo-dot { width:9px; height:9px; background:var(--accent2); border-radius:50%; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.4);opacity:0.7} }
  .sidebar-nav { padding:16px 12px; flex:1; }
  .nav-item { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px; color:var(--muted); font-size:0.88rem; font-weight:500; cursor:pointer; transition:all 0.2s; margin-bottom:4px; text-decoration:none; }
  .nav-item:hover { background:rgba(255,255,255,0.04); color:var(--text); }
  .nav-item.active { background:rgba(91,94,244,0.15); color:var(--accent); font-weight:600; }
  .nav-item span:first-child { font-size:1.1rem; width:20px; text-align:center; }

  .main { margin-left:240px; flex:1; padding:48px 60px; max-width:800px; }
  .page-title { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; letter-spacing:-0.04em; margin-bottom:8px; }
  .page-sub { color:var(--muted); margin-bottom:40px; }

  .steps { display:flex; gap:0; margin-bottom:40px; position:relative; }
  .steps::before { content:''; position:absolute; top:20px; left:20px; right:20px; height:2px; background:var(--border); z-index:0; }
  .step { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; position:relative; z-index:1; }
  .step-circle { width:40px; height:40px; border-radius:50%; border:2px solid var(--border); background:var(--card); display:flex; align-items:center; justify-content:center; font-size:0.85rem; font-weight:700; transition:all 0.3s; }
  .step.active .step-circle { border-color:var(--accent); background:var(--accent); color:#fff; }
  .step.done .step-circle { border-color:var(--accent2); background:rgba(0,229,192,0.1); color:var(--accent2); }
  .step-label { font-size:0.78rem; color:var(--muted); text-align:center; }
  .step.active .step-label { color:var(--text); font-weight:600; }

  .form-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px; margin-bottom:20px; }
  .form-card-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; margin-bottom:24px; display:flex; align-items:center; gap:10px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  .form-group { margin-bottom:20px; }
  label { display:block; font-size:0.8rem; font-weight:600; color:var(--muted); margin-bottom:8px; letter-spacing:0.04em; text-transform:uppercase; }
  input,textarea,select { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:13px 16px; color:var(--text); font-size:0.92rem; font-family:'Noto Sans TC',sans-serif; outline:none; transition:border-color 0.2s; }
  input:focus,textarea:focus,select:focus { border-color:var(--accent); }
  select option { background:var(--card); }
  .char-count { font-size:0.75rem; color:var(--muted); text-align:right; margin-top:4px; }

  .reminder-options { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
  .reminder-chip { padding:8px 16px; background:var(--surface); border:1px solid var(--border); border-radius:100px; font-size:0.82rem; cursor:pointer; transition:all 0.2s; user-select:none; }
  .reminder-chip.selected { border-color:var(--accent); background:rgba(91,94,244,0.12); color:var(--accent); font-weight:600; }

  .preview-card { background:linear-gradient(135deg,rgba(91,94,244,0.12),rgba(0,229,192,0.06)); border:1px solid rgba(91,94,244,0.2); border-radius:16px; padding:24px; margin-bottom:20px; }
  .preview-title { font-size:0.78rem; font-weight:700; color:var(--accent); letter-spacing:0.08em; text-transform:uppercase; margin-bottom:14px; }
  .preview-item { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.9rem; }
  .preview-item:last-child { border-bottom:none; }
  .preview-item span:last-child { color:var(--accent2); font-weight:600; }

  .btn { padding:14px 28px; border-radius:12px; font-size:0.95rem; font-weight:700; cursor:pointer; border:none; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; display:inline-flex; align-items:center; gap:8px; }
  .btn-accent { background:var(--accent); color:#fff; width:100%; justify-content:center; }
  .btn-accent:hover { background:#7b7ef8; box-shadow:0 8px 24px rgba(91,94,244,0.4); transform:translateY(-1px); }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:rgba(255,255,255,0.15); color:var(--text); }

  .success-state { text-align:center; padding:20px; }
  .success-icon { font-size:4rem; margin-bottom:20px; animation:bounce 0.5s ease; }
  @keyframes bounce { 0%{transform:scale(0.5)} 70%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .link-box { background:var(--surface); border:1px solid rgba(91,94,244,0.3); border-radius:12px; padding:16px 20px; display:flex; align-items:center; gap:12px; margin:20px 0; }
  .link-url { font-size:0.88rem; color:var(--accent); flex:1; word-break:break-all; }
  .copy-btn { background:var(--accent); color:#fff; padding:8px 16px; border-radius:8px; font-size:0.82rem; font-weight:700; cursor:pointer; border:none; font-family:sans-serif; white-space:nowrap; transition:all 0.2s; }
  .copy-btn:hover { background:#7b7ef8; }

  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 20px; font-size:0.88rem; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  @media(max-width:900px) { .sidebar{display:none} .main{margin-left:0;padding:32px 20px} .form-row{grid-template-columns:1fr} }
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo"><div class="logo-dot"></div>PayClub</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><span>🏠</span>總覽</a>
    <a class="nav-item active" href="create.html"><span>➕</span>建立活動</a>
    <a class="nav-item" href="report.html"><span>📊</span>財務報表</a>
    <a class="nav-item" href="pay.html"><span>💳</span>繳費頁範例</a>
    <a class="nav-item" href="index.html"><span>🌐</span>回首頁</a>
  </nav>
</aside>

<main class="main">
  <div class="page-title">建立收款活動</div>
  <div class="page-sub">填寫活動資訊，系統自動生成收款連結</div>

  <div class="steps">
    <div class="step active" id="step1"><div class="step-circle">1</div><div class="step-label">活動資訊</div></div>
    <div class="step" id="step2"><div class="step-circle">2</div><div class="step-label">成員設定</div></div>
    <div class="step" id="step3"><div class="step-circle">3</div><div class="step-label">確認建立</div></div>
  </div>

  <!-- STEP 1 -->
  <div id="formStep1">
    <div class="form-card">
      <div class="form-card-title">📋 活動基本資訊</div>
      <div class="form-group"><label>活動名稱 *</label><input type="text" id="s1Title" placeholder="例：2025 迎新活動費用" oninput="updatePreview()"></div>
      <div class="form-row">
        <div class="form-group"><label>收款金額（每人）*</label><input type="number" id="s1Amount" placeholder="300" min="1" oninput="updatePreview()"></div>
        <div class="form-group"><label>截止日期 *</label><input type="date" id="s1Deadline" oninput="updatePreview()"></div>
      </div>
      <div class="form-group"><label>活動說明</label><textarea id="s1Desc" rows="2" placeholder="填寫活動相關說明，成員繳費時會看到" oninput="this.nextElementSibling.textContent=this.value.length+'/100'"></textarea><div class="char-count">0/100</div></div>
      <div class="form-group">
        <label>自動催款提醒</label>
        <div class="reminder-options">
          <div class="reminder-chip selected" onclick="this.classList.toggle('selected')">截止前 7 天</div>
          <div class="reminder-chip selected" onclick="this.classList.toggle('selected')">截止前 3 天</div>
          <div class="reminder-chip selected" onclick="this.classList.toggle('selected')">截止前 1 天</div>
          <div class="reminder-chip" onclick="this.classList.toggle('selected')">截止當天</div>
        </div>
      </div>
    </div>
    <button class="btn btn-accent" onclick="goStep2()">下一步：設定成員 →</button>
  </div>

  <!-- STEP 2 -->
  <div id="formStep2" style="display:none">
    <div class="form-card">
      <div class="form-card-title">👥 成員名單</div>
      <div class="form-group"><label>成員名單（每行一位）</label><textarea id="s2Members" rows="8" placeholder="林小明&#10;陳美玲&#10;王大衛&#10;張雅婷&#10;黃俊豪"></textarea></div>
      <div style="color:var(--muted);font-size:0.82rem;margin-top:-12px">💡 也可以直接分享連結，讓成員自己輸入名字繳費</div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-ghost" onclick="goStep(1)">← 上一步</button>
      <button class="btn btn-accent" style="flex:1" onclick="goStep3()">下一步：確認建立 →</button>
    </div>
  </div>

  <!-- STEP 3 -->
  <div id="formStep3" style="display:none">
    <div class="preview-card">
      <div class="preview-title">活動預覽</div>
      <div class="preview-item"><span>活動名稱</span><span id="prev-title">—</span></div>
      <div class="preview-item"><span>每人金額</span><span id="prev-amount">—</span></div>
      <div class="preview-item"><span>截止日期</span><span id="prev-deadline">—</span></div>
      <div class="preview-item"><span>成員人數</span><span id="prev-members">—</span></div>
      <div class="preview-item"><span>預計總收款</span><span id="prev-total">—</span></div>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn btn-ghost" onclick="goStep(2)">← 上一步</button>
      <button class="btn btn-accent" style="flex:1" onclick="submitCreate()">🚀 建立活動並生成連結</button>
    </div>
  </div>

  <!-- SUCCESS -->
  <div id="successState" style="display:none">
    <div class="form-card success-state">
      <div class="success-icon">🎉</div>
      <div style="font-family:Syne,sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:8px">活動建立成功！</div>
      <div style="color:var(--muted);margin-bottom:4px">分享以下連結給成員，他們可以直接線上繳費</div>
      <div class="link-box">
        <div class="link-url" id="generatedLink">—</div>
        <button class="copy-btn" onclick="copyGeneratedLink()">複製</button>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:8px">
        <button class="btn btn-ghost" onclick="location.href='dashboard.html'">回到儀表板</button>
        <button class="btn btn-accent" onclick="previewPayPage()">預覽繳費頁面 →</button>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
const d = new Date(); d.setDate(d.getDate()+14);
document.getElementById('s1Deadline').value = d.toISOString().split('T')[0];

let currentStep = 1;
let createdEventId = null;

function goStep(n){ currentStep=n; [1,2,3].forEach(i=>{ document.getElementById('formStep'+i).style.display=i===n?'block':'none'; document.getElementById('step'+i).className='step'+(i<n?' done':i===n?' active':''); }); }
function goStep2(){ const t=document.getElementById('s1Title').value.trim(), a=document.getElementById('s1Amount').value, dl=document.getElementById('s1Deadline').value; if(!t||!a||!dl){showToast('❌ 請填寫所有必填欄位');return;} goStep(2); }
function goStep3(){ updateFinalPreview(); goStep(3); }

function updatePreview(){}
function updateFinalPreview(){
  const title = document.getElementById('s1Title').value||'—';
  const amount = document.getElementById('s1Amount').value||'0';
  const deadline = document.getElementById('s1Deadline').value||'—';
  const membersRaw = document.getElementById('s2Members').value.trim();
  const memberCount = membersRaw ? membersRaw.split('\n').filter(Boolean).length : 0;
  document.getElementById('prev-title').textContent = title;
  document.getElementById('prev-amount').textContent = '$'+parseInt(amount).toLocaleString();
  document.getElementById('prev-deadline').textContent = deadline;
  document.getElementById('prev-members').textContent = memberCount>0?memberCount+'人':'開放自填';
  document.getElementById('prev-total').textContent = memberCount>0?'$'+(parseInt(amount)*memberCount).toLocaleString():'依實際人數';
}

function submitCreate(){
  const title = document.getElementById('s1Title').value.trim();
  const amount = parseInt(document.getElementById('s1Amount').value);
  const deadline = document.getElementById('s1Deadline').value;
  const desc = document.getElementById('s1Desc').value.trim();
  const membersRaw = document.getElementById('s2Members').value.trim();
  const memberNames = membersRaw ? membersRaw.split('\n').map(n=>n.trim()).filter(Boolean) : [];
  const members = memberNames.length>0 ? memberNames.map(name=>({name,status:'pending',paidAt:''})) : [{name:'成員1',status:'pending',paidAt:''},{name:'成員2',status:'pending',paidAt:''},{name:'成員3',status:'pending',paidAt:''}];
  const evts = JSON.parse(localStorage.getItem('pc_events')||'null') || [];
  const newEvent = {id:'e'+Date.now(), title, amount, deadline, desc, status:'active', members};
  evts.unshift(newEvent);
  localStorage.setItem('pc_events', JSON.stringify(evts));
  createdEventId = newEvent.id;
  const link = location.href.replace('create.html','pay.html')+'?event='+newEvent.id;
  document.getElementById('generatedLink').textContent = link;
  [1,2,3].forEach(i=>{ document.getElementById('formStep'+i).style.display='none'; document.getElementById('step'+i).className='step done'; });
  document.getElementById('successState').style.display='block';
}

function copyGeneratedLink(){ const url=document.getElementById('generatedLink').textContent; navigator.clipboard.writeText(url).catch(()=>{}); showToast('🔗 連結已複製！'); }
function previewPayPage(){ location.href='pay.html?event='+createdEventId; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
</script>
</body>
</html>
