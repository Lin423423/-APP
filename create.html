<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建立活動 — PayClub</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css"><script src="pc_auth.js"></script>
<style>
body{display:flex;}
.content{max-width:680px;width:100%;}
.steps{display:flex;align-items:center;margin-bottom:28px;}
.step-item{display:flex;align-items:center;gap:7px;}
.step-circle{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:var(--text3);transition:all 0.25s;flex-shrink:0;}
.step-item.active .step-circle{border-color:var(--accent);background:var(--accent);color:#fff;}
.step-item.done .step-circle{border-color:var(--green);background:var(--green);color:#fff;}
.step-line{flex:1;height:2px;background:var(--border);margin:0 12px;}
.step-line.done{background:var(--green);}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow-md);margin-bottom:24px;}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:0.82rem;font-weight:700;color:var(--text2);margin-bottom:8px;}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:0.95rem;transition:all 0.2s;outline:none;}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.btn-row{display:flex;justify-content:flex-end;gap:12px;margin-top:32px;}
</style>
</head>
<body>

<script>renderSidebar();</script>

<main class="main">
  <div class="content">
    <div class="steps">
      <div id="si1" class="step-item active"><div class="step-circle">1</div><span style="font-size:0.85rem;font-weight:600">基本資訊</span></div>
      <div id="sl1" class="step-line"></div>
      <div id="si2" class="step-item"><div class="step-circle">2</div><span style="font-size:0.85rem;font-weight:600">金額設定</span></div>
      <div id="sl2" class="step-line"></div>
      <div id="si3" class="step-item"><div class="step-circle">3</div><span style="font-size:0.85rem;font-weight:600">確認預覽</span></div>
    </div>

    <div id="s1" class="card">
      <h2 style="margin-bottom:20px;">建立新活動</h2>
      <div class="form-group">
        <label class="form-label">活動名稱</label>
        <input type="text" id="s1Title" class="form-input" placeholder="例如：12月系學會聚餐">
      </div>
      <div class="form-group">
        <label class="form-label">截止日期</label>
        <div style="display:flex;gap:8px;">
          <select id="dlYear" class="form-input" style="flex:2"></select>
          <select id="dlMonth" class="form-input" style="flex:1"></select>
          <select id="dlDay" class="form-input" style="flex:1"></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">活動說明 (選填)</label>
        <textarea id="s1Desc" class="form-input" style="min-height:80px;resize:none;" placeholder="簡單介紹活動內容..."></textarea>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="goStep(2)">下一步</button>
      </div>
    </div>

    <div id="s2" class="card" style="display:none;">
      <h2 style="margin-bottom:20px;">金額設定</h2>
      <div class="form-group">
        <label class="form-label">收費模式</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div id="m1" class="role-option active" style="margin-bottom:0" onclick="setMode('fixed')">
            <div style="font-weight:600">固定金額</div>
            <div style="font-size:0.75rem;color:var(--text3)">每人收費相同</div>
          </div>
          <div id="m2" class="role-option" style="margin-bottom:0" onclick="setMode('flex')">
            <div style="font-weight:600">彈性金額</div>
            <div style="font-size:0.75rem;color:var(--text3)">每人收費不同</div>
          </div>
        </div>
      </div>
      <div id="fixedInput" class="form-group">
        <label class="form-label">收費金額 (TWD)</label>
        <input type="number" id="fixedAmt" class="form-input" placeholder="500">
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goStep(1)">上一步</button>
        <button class="btn btn-primary" onclick="preview()">下一步</button>
      </div>
    </div>

    <div id="s3" class="card" style="display:none;">
      <h2 style="margin-bottom:20px;">確認活動資訊</h2>
      <div style="background:var(--bg);padding:20px;border-radius:10px;margin-bottom:20px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div><label class="form-label">活動標題</label><div id="pTitle" style="font-weight:600"></div></div>
          <div><label class="form-label">截止日期</label><div id="pDl" style="font-weight:600"></div></div>
          <div><label class="form-label">收費模式</label><div id="pMode" style="font-weight:600"></div></div>
          <div><label class="form-label">金額</label><div id="pAmt" style="font-weight:600"></div></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="goStep(2)">上一步</button>
        <button class="btn btn-primary" onclick="submitCreate()">確認並建立</button>
      </div>
    </div>

    <div id="sSuccess" class="card" style="display:none;text-align:center;padding:48px 32px;">
      <div style="font-size:3.5rem;margin-bottom:16px;">✨</div>
      <h2 style="margin-bottom:12px;">活動建立成功！</h2>
      <p style="color:var(--text2);margin-bottom:32px;">您可以將連結或邀請碼分享給成員。</p>
      
      <div style="background:var(--accent-light);border:1.5px dashed var(--accent);border-radius:12px;padding:24px;margin-bottom:24px;">
        <div style="font-size:0.75rem;font-weight:700;color:var(--accent);margin-bottom:8px;">專屬邀請碼</div>
        <div id="inviteCode" style="font-family:'Plus Jakarta Sans',sans-serif;font-size:2.2rem;font-weight:800;color:var(--accent);letter-spacing:4px;"></div>
      </div>

      <div class="form-group" style="text-align:left;">
        <label class="form-label">繳費連結</label>
        <div style="display:flex;gap:8px;">
          <div id="generatedLink" class="form-input" style="background:var(--bg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem;color:var(--text2);"></div>
          <button class="btn btn-ghost" onclick="copyInviteCode()">複製</button>
        </div>
      </div>

      <div style="margin-top:32px;">
        <button class="btn btn-primary" style="width:100%" onclick="location.href='dashboard.html'">進入儀表板</button>
      </div>
    </div>
  </div>
</main>

<script>
// 初始化日期下拉選單
const yS=document.getElementById('dlYear'), mS=document.getElementById('dlMonth'), dS=document.getElementById('dlDay');
const now=new Date();
for(let i=0; i<3; i++) yS.add(new Option(now.getFullYear()+i, now.getFullYear()+i));
for(let i=1; i<=12; i++) mS.add(new Option(i, i));
for(let i=1; i<=31; i++) dS.add(new Option(i, i));
mS.value=now.getMonth()+1; dS.value=now.getDate();

let amtMode = 'fixed';

function goStep(n){
  [1,2,3].forEach(i=>{
    document.getElementById('s'+i).style.display = (i===n)?'block':'none';
    const it = document.getElementById('si'+i);
    it.className = (i<n)?'step-item done':(i===n)?'step-item active':'step-item';
    const ln = document.getElementById('sl'+i);
    if(ln) ln.className = (i<n)?'step-line done':'step-line';
  });
}

function setMode(m){
  amtMode=m;
  document.getElementById('m1').className = m==='fixed'?'role-option active':'role-option';
  document.getElementById('m2').className = m==='flex'?'role-option active':'role-option';
  document.getElementById('fixedInput').style.display = m==='fixed'?'block':'none';
}

function preview(){
  const title = document.getElementById('s1Title').value.trim();
  if(!title){ PC_toast('請輸入活動名稱'); return; }
  
  document.getElementById('pTitle').textContent = title;
  document.getElementById('pDl').textContent = `${yS.value}-${mS.value}-${dS.value}`;
  document.getElementById('pMode').textContent = amtMode==='fixed'?'固定金額':'彈性金額';
  document.getElementById('pAmt').textContent = amtMode==='fixed'?'$'+(document.getElementById('fixedAmt').value||0):'由繳費者填寫';
  goStep(3);
}

function submitCreate(){
  const user = PC_getUser();
  if(!user){ PC_toast('登入逾時，請重新登入'); return; }

  const title = document.getElementById('s1Title').value.trim();
  const dl = `${yS.value}-${mS.value.padStart(2,'0')}-${dS.value.padStart(2,'0')}`;
  const desc = document.getElementById('s1Desc').value.trim();
  const amt = amtMode === 'fixed' ? (document.getElementById('fixedAmt').value || 0) : 0;
  const code = Math.random().toString(36).substring(2,8).toUpperCase();
  const id = 'e' + Date.now();

  const newEvt = {
    id: id,
    title: title,
    ownerEmail: user.email, // 💡 關鍵：存入目前登入者的 Email
    amountMode: amtMode,
    amount: amt,
    deadline: dl,
    desc: desc,
    status: 'active',
    inviteCode: code,
    members: [] // 初始成員為空，主辦人不需要把自己加入 members 列表也能管理
  };

  const evts = PC_getEvents();
  evts.unshift(newEvt);
  PC_saveEvents(evts);

  // 顯示結果
  document.getElementById('inviteCode').textContent = code;
  const link = location.origin + location.pathname.replace('create.html', 'pay.html') + '?event=' + id;
  document.getElementById('generatedLink').textContent = link;

  goStep(4); // 隱藏步驟，顯示成功
  document.getElementById('s3').style.display = 'none';
  document.getElementById('sSuccess').style.display = 'block';
}

function copyInviteCode(){
  const link = document.getElementById('generatedLink').textContent;
  PC_copyText(link, '✅ 繳費連結已複製');
}
</script>
</body>
</html>
